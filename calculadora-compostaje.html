<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora Financiera — Compostaje Comunitario Quito</title>
<meta name="description" content="Herramienta gratuita para calcular costos, punto de equilibrio y rentabilidad de emprendimientos de compostaje en Quito.">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:linear-gradient(170deg,#FFF8E7 0%,#F0E8D5 40%,#E8DFC8 100%);color:#3E2723;min-height:100vh}
input,select,textarea,button{font-family:inherit}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useMemo,useCallback}=React;

// ══════════════════════════════════════════
// CONFIGURACIÓN: Pega aquí tu URL de Google Apps Script
// ══════════════════════════════════════════
const GOOGLE_SCRIPT_URL = ""; // ← PEGA TU URL AQUÍ
// ══════════════════════════════════════════

const C={earth:"#2D5016",earthL:"#3A6B1E",leaf:"#5B8C2A",lime:"#A4D65E",cream:"#FFF8E7",warm:"#F5E6C8",bark:"#5C3D2E",barkL:"#7A5642",soil:"#3E2723",amber:"#E8A317",danger:"#C0392B",success:"#27AE60",white:"#FFFFFF",ghost:"rgba(45,80,22,0.06)"};
const f$=v=>`$${Number(v).toFixed(2)}`;
const fN=v=>Number(v).toLocaleString("es-EC",{maximumFractionDigits:1});
const FREQ=[{value:4,label:"1 vez por semana"},{value:2,label:"Cada 2 semanas"},{value:1,label:"1 vez al mes"}];
const TRANS=[{value:"vehiculo",label:"Vehículo propio"},{value:"moto",label:"Moto"},{value:"bicicargo",label:"Bici-cargo"},{value:"publico",label:"Transporte público"},{value:"mixto",label:"Mixto (vehículo + bus)"}];
const CERTS_DEF=[
  {id:"gad",label:"Registro GAD Quito (Gestión de Residuos)",on:true,valor:100,anios:3},
  {id:"luae",label:"LUAE (Licencia Única Actividades Económicas)",on:true,valor:80,anios:1},
  {id:"lic_amb",label:"Licencia Ambiental (MAATE)",on:false,valor:250,anios:5},
  {id:"iso",label:"ISO 14001 (Gestión Ambiental)",on:false,valor:1500,anios:3},
  {id:"bpm",label:"Buenas Prácticas de Manufactura",on:false,valor:400,anios:3},
  {id:"organico",label:"Certificación Producción Orgánica",on:false,valor:600,anios:2},
  {id:"circular",label:"Sello Economía Circular Ecuador",on:false,valor:300,anios:3},
  {id:"bcorp",label:"Certificación B Corp",on:false,valor:2000,anios:3},
];
const INTANG_FIJOS=[
  {id:"ruc",nombre:"Constitución empresa / RUC",valor:200,anios:5,on:true},
  {id:"marca",nombre:"Diseño de marca / logo / web",valor:300,anios:5,on:true},
  {id:"capac",nombre:"Capacitación inicial",valor:100,anios:3,on:true},
];

// ─── UI Components ───
function Inp({label,value,onChange,unit,hint,min=0,step=1,max,disabled}){
  return <div style={{marginBottom:16}}>
    <label style={{display:"block",fontSize:13,fontWeight:600,color:C.bark,marginBottom:4}}>{label}</label>
    <div style={{display:"flex",alignItems:"center",gap:6}}>
      <input type="number" value={value} onChange={e=>onChange(Number(e.target.value))} min={min} step={step} max={max} disabled={disabled}
        style={{width:"100%",padding:"10px 12px",border:`1.5px solid ${C.warm}`,borderRadius:10,fontSize:15,fontFamily:"'DM Mono',monospace",color:disabled?C.barkL:C.soil,background:disabled?"#f5f0e8":C.white,outline:"none"}}/>
      {unit&&<span style={{fontSize:12,color:C.barkL,whiteSpace:"nowrap"}}>{unit}</span>}
    </div>
    {hint&&<span style={{fontSize:11,color:C.barkL,marginTop:2,display:"block"}}>{hint}</span>}
  </div>;
}
function Txt({label,value,onChange,hint,placeholder,multiline}){
  const s={width:"100%",padding:"10px 12px",border:`1.5px solid ${C.warm}`,borderRadius:10,fontSize:14,color:C.soil,background:C.white,outline:"none",resize:"vertical",boxSizing:"border-box"};
  return <div style={{marginBottom:16}}>
    <label style={{display:"block",fontSize:13,fontWeight:600,color:C.bark,marginBottom:4}}>{label}</label>
    {multiline?<textarea value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} rows={3} style={s}/>
    :<input type="text" value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} style={s}/>}
    {hint&&<span style={{fontSize:11,color:C.barkL,marginTop:2,display:"block"}}>{hint}</span>}
  </div>;
}
function Sel({label,value,onChange,options,hint}){
  return <div style={{marginBottom:16}}>
    <label style={{display:"block",fontSize:13,fontWeight:600,color:C.bark,marginBottom:4}}>{label}</label>
    <select value={value} onChange={e=>onChange(e.target.value)}
      style={{width:"100%",padding:"10px 12px",border:`1.5px solid ${C.warm}`,borderRadius:10,fontSize:14,color:C.soil,background:C.white,outline:"none"}}>
      {options.map(o=><option key={o.value} value={o.value}>{o.label}</option>)}
    </select>
    {hint&&<span style={{fontSize:11,color:C.barkL,marginTop:2,display:"block"}}>{hint}</span>}
  </div>;
}
function Sec({title,icon,children,accent=C.earth}){
  return <div style={{background:C.white,borderRadius:16,padding:"24px 22px",marginBottom:20,border:`1px solid ${C.warm}`,boxShadow:"0 2px 12px rgba(45,80,22,0.06)"}}>
    <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:18}}>
      <span style={{fontSize:22}}>{icon}</span>
      <h3 style={{margin:0,fontSize:16,fontWeight:700,color:accent,fontFamily:"'Playfair Display',serif"}}>{title}</h3>
    </div>{children}
  </div>;
}
function MC({label,value,sub,color=C.earth,large}){
  return <div style={{background:`linear-gradient(135deg,${color}11,${color}08)`,borderRadius:14,padding:large?"20px 18px":"14px",border:`1px solid ${color}22`,flex:1,minWidth:140}}>
    <div style={{fontSize:11,color:C.barkL,fontWeight:600,marginBottom:4,textTransform:"uppercase",letterSpacing:0.8}}>{label}</div>
    <div style={{fontSize:large?26:20,fontWeight:700,color,fontFamily:"'DM Mono',monospace"}}>{value}</div>
    {sub&&<div style={{fontSize:11,color:C.barkL,marginTop:2}}>{sub}</div>}
  </div>;
}
function BC({data,color=C.leaf,height=160}){
  const mx=Math.max(...data.map(d=>d.value),1);
  return <div style={{display:"flex",alignItems:"flex-end",gap:6,height,padding:"0 4px"}}>
    {data.map((d,i)=><div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",height:"100%"}}>
      <div style={{flex:1,width:"100%",display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
        <div style={{width:"70%",maxWidth:48,height:`${Math.max((d.value/mx)*100,2)}%`,background:d.hl?C.amber:`linear-gradient(180deg,${color},${color}BB)`,borderRadius:"6px 6px 2px 2px",position:"relative"}}>
          <span style={{position:"absolute",top:-18,left:"50%",transform:"translateX(-50%)",fontSize:9,fontWeight:600,color:C.bark,whiteSpace:"nowrap",fontFamily:"'DM Mono',monospace"}}>{f$(d.value)}</span>
        </div>
      </div>
      <span style={{fontSize:9,color:C.barkL,marginTop:4,textAlign:"center"}}>{d.label}</span>
    </div>)}
  </div>;
}
function PB({value,max,label,color}){
  const p=Math.min((value/max)*100,100);
  return <div style={{marginBottom:12}}>
    <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:4}}>
      <span style={{color:C.bark,fontWeight:600}}>{label}</span><span style={{color:C.barkL}}>{fN(p)}%</span>
    </div>
    <div style={{height:8,background:C.ghost,borderRadius:4,overflow:"hidden"}}><div style={{width:`${p}%`,height:"100%",background:color,borderRadius:4}}/></div>
  </div>;
}
function IB({children,color=C.earth}){
  return <div style={{background:`${color}0A`,borderRadius:10,padding:"10px 14px",marginBottom:12,border:`1px dashed ${color}30`,fontSize:12,color:C.barkL,lineHeight:1.6}}>{children}</div>;
}
function AssetCard({a,onChange,onRemove,showRes}){
  const dep=a.vidaAnios>0?Math.max(a.valor-(a.residual||0),0)/(a.vidaAnios*12):0;
  return <div style={{background:C.ghost,borderRadius:10,padding:"10px 12px 8px",marginBottom:8,position:"relative"}}>
    <button onClick={onRemove} style={{position:"absolute",top:8,right:8,width:24,height:24,border:"none",borderRadius:6,background:`${C.danger}15`,color:C.danger,cursor:"pointer",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 10px"}}>
      <div style={{gridColumn:"1/-1",marginBottom:8,paddingRight:30}}>
        <input type="text" value={a.nombre} placeholder="¿Qué es?" onChange={e=>onChange({...a,nombre:e.target.value})}
          style={{width:"100%",padding:"7px 10px",border:`1.5px solid ${C.warm}`,borderRadius:8,fontSize:13,color:C.soil,background:C.white,outline:"none",boxSizing:"border-box"}}/>
      </div>
      <div style={{marginBottom:8}}>
        <label style={{fontSize:10,fontWeight:600,color:C.barkL}}>Costó $</label>
        <input type="number" value={a.valor} min={0} onChange={e=>onChange({...a,valor:Number(e.target.value)})}
          style={{width:"100%",padding:"7px 8px",border:`1.5px solid ${C.warm}`,borderRadius:8,fontSize:13,fontFamily:"'DM Mono',monospace",color:C.soil,background:C.white,outline:"none",textAlign:"right",boxSizing:"border-box"}}/>
      </div>
      <div style={{marginBottom:8}}>
        <label style={{fontSize:10,fontWeight:600,color:C.barkL}}>¿Cuánto dura?</label>
        <select value={a.vidaAnios} onChange={e=>onChange({...a,vidaAnios:Number(e.target.value)})}
          style={{width:"100%",padding:"7px 6px",border:`1.5px solid ${C.warm}`,borderRadius:8,fontSize:12,color:C.soil,background:C.white,outline:"none",boxSizing:"border-box"}}>
          {[1,2,3,4,5,7,10].map(y=><option key={y} value={y}>{y} año{y>1?"s":""}</option>)}
        </select>
      </div>
      {showRes&&<div style={{gridColumn:"1/-1",marginBottom:6}}>
        <label style={{fontSize:10,fontWeight:600,color:C.barkL}}>¿En cuánto podrías venderlo al final?</label>
        <input type="number" value={a.residual||0} min={0} max={a.valor} onChange={e=>onChange({...a,residual:Math.min(Number(e.target.value),a.valor)})}
          style={{width:"100%",padding:"7px 8px",border:`1.5px solid ${C.warm}`,borderRadius:8,fontSize:13,fontFamily:"'DM Mono',monospace",color:C.soil,background:C.white,outline:"none",textAlign:"right",boxSizing:"border-box"}}/>
        <span style={{fontSize:10,color:C.barkL}}>0 si no tiene reventa. Vehículos: ~20-30%.</span>
      </div>}
    </div>
    <div style={{fontSize:11,color:C.barkL,borderTop:`1px dashed ${C.warm}`,paddingTop:4,display:"flex",justifyContent:"space-between"}}>
      <span>{a.nombre||"—"}</span>
      <span>Desgaste: <strong style={{color:C.earth}}>{f$(Math.max(dep,0))}/mes</strong></span>
    </div>
  </div>;
}
function TierCard({t,onChange,onRemove,nLabel,nField,cLabel}){
  return <div style={{background:C.ghost,borderRadius:12,padding:"14px 14px 8px",marginBottom:12,position:"relative"}}>
    <button onClick={onRemove} style={{position:"absolute",top:10,right:10,width:26,height:26,border:"none",borderRadius:6,background:`${C.danger}15`,color:C.danger,cursor:"pointer",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 12px"}}>
      <div style={{gridColumn:"1/-1",marginBottom:10}}>
        <label style={{fontSize:11,fontWeight:600,color:C.barkL,marginBottom:3,display:"block"}}>{nLabel}</label>
        <input type="text" value={t[nField]} placeholder="Ej: Semanal, Restaurantes..." onChange={e=>onChange({...t,[nField]:e.target.value})}
          style={{width:"100%",padding:"8px 10px",border:`1.5px solid ${C.warm}`,borderRadius:8,fontSize:13,color:C.soil,background:C.white,outline:"none",boxSizing:"border-box"}}/>
      </div>
      {[{l:cLabel,k:"cantidad",s:1},{l:"Kg/recolección",k:"kgPorRecol",s:0.5}].map(f=>
        <div key={f.k} style={{marginBottom:10}}>
          <label style={{fontSize:11,fontWeight:600,color:C.barkL,marginBottom:3,display:"block"}}>{f.l}</label>
          <input type="number" value={t[f.k]} min={0} step={f.s} onChange={e=>onChange({...t,[f.k]:Number(e.target.value)})}
            style={{width:"100%",padding:"8px 10px",border:`1.5px solid ${C.warm}`,borderRadius:8,fontSize:13,fontFamily:"'DM Mono',monospace",color:C.soil,background:C.white,outline:"none",boxSizing:"border-box"}}/>
        </div>)}
      <div style={{marginBottom:10}}>
        <label style={{fontSize:11,fontWeight:600,color:C.barkL,marginBottom:3,display:"block"}}>Frecuencia</label>
        <select value={t.frecuencia} onChange={e=>onChange({...t,frecuencia:Number(e.target.value)})}
          style={{width:"100%",padding:"8px 10px",border:`1.5px solid ${C.warm}`,borderRadius:8,fontSize:12,color:C.soil,background:C.white,outline:"none",boxSizing:"border-box"}}>
          {FREQ.map(o=><option key={o.value} value={o.value}>{o.label}</option>)}
        </select>
      </div>
      <div style={{marginBottom:10}}>
        <label style={{fontSize:11,fontWeight:600,color:C.barkL,marginBottom:3,display:"block"}}>Tarifa $/mes</label>
        <input type="number" value={t.tarifa} min={0} step={0.5} onChange={e=>onChange({...t,tarifa:Number(e.target.value)})}
          style={{width:"100%",padding:"8px 10px",border:`1.5px solid ${C.warm}`,borderRadius:8,fontSize:13,fontFamily:"'DM Mono',monospace",color:C.soil,background:C.white,outline:"none",boxSizing:"border-box"}}/>
      </div>
    </div>
    <div style={{fontSize:11,color:C.barkL,borderTop:`1px dashed ${C.warm}`,paddingTop:6,display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:4}}>
      <span>{t.cantidad}×{fN(t.kgPorRecol)}kg×{t.frecuencia}x = <strong style={{color:C.earth}}>{fN(t.cantidad*t.kgPorRecol*t.frecuencia)} kg/mes</strong></span>
      <span><strong style={{color:C.earth}}>{f$(t.cantidad*t.tarifa)}/mes</strong></span>
    </div>
  </div>;
}

const TABS=[{id:"costos",label:"Costos",icon:"📊"},{id:"ingresos",label:"Ingresos",icon:"💰"},{id:"resultados",label:"Resultados",icon:"🎯"},{id:"proyeccion",label:"Proyección",icon:"📈"}];

function App(){
  const [nombre,setNombre]=useState("");
  const [email,setEmail]=useState("");
  const [tel,setTel]=useState("");
  const [submitted,setSub]=useState(false);
  const [sending,setSending]=useState(false);
  const [sendError,setSendError]=useState("");

  const [hTiers,setHT]=useState([
    {id:1,plan:"Semanal",cantidad:50,kgPorRecol:4,frecuencia:4,tarifa:10},
    {id:2,plan:"Quincenal",cantidad:25,kgPorRecol:5,frecuencia:2,tarifa:7},
    {id:3,plan:"Mensual",cantidad:10,kgPorRecol:6,frecuencia:1,tarifa:5},
  ]);
  const [nxH,sNxH]=useState(4);
  const [eTiers,setET]=useState([
    {id:1,tipo:"Restaurantes",cantidad:3,kgPorRecol:20,frecuencia:4,tarifa:40},
    {id:2,tipo:"Oficinas",cantidad:2,kgPorRecol:8,frecuencia:2,tarifa:20},
  ]);
  const [nxE,sNxE]=useState(3);

  const [numTC,setNumTC]=useState(1);
  const [salTC,setSalTC]=useState(460);
  const [numJ,setNumJ]=useState(2);
  const [pagoJ,setPagoJ]=useState(20);
  const [diasJ,setDiasJ]=useState(8);

  const [arriendo,setArr]=useState(250);
  const [agua,setAgua]=useState(15);
  const [luz,setLuz]=useState(25);
  const [mktCM,setMktCM]=useState(30);
  const [mktPauta,setMktP]=useState(20);
  const [otrosF,setOtrosF]=useState(0);
  const [otrosFD,setOtrosFD]=useState("");

  const [assets,setAssets]=useState([
    {id:1,nombre:"Bici-cargo / vehículo",valor:3000,vidaAnios:5,residual:600},
    {id:2,nombre:"Compostera / equipos",valor:800,vidaAnios:5,residual:0},
    {id:3,nombre:"Herramientas",valor:300,vidaAnios:3,residual:0},
    {id:4,nombre:"Baldes iniciales",valor:400,vidaAnios:2,residual:0},
    {id:5,nombre:"Adecuación espacio",valor:500,vidaAnios:5,residual:0},
  ]);
  const [nxA,sNxA]=useState(6);
  const [certs,setCerts]=useState(CERTS_DEF.map(c=>({...c})));
  const [ccerts,setCCerts]=useState([]);
  const [nxCC,sNxCC]=useState(1);
  const [intFijos,setIF]=useState(INTANG_FIJOS.map(i=>({...i})));
  const [capTrab,setCapTrab]=useState(1500);

  const [tipoTrans,setTipoTrans]=useState("bicicargo");
  const [combustible,setComb]=useState(80);
  const [transPub,setTransPub]=useState(0);
  const [mantVeh,setMantVeh]=useState(40);
  const [insumos,setInsumos]=useState(35);
  const [baldes,setBaldes]=useState(20);
  const [otrosV,setOtrosV]=useState(0);

  const [pctVenta,setPctV]=useState(60);
  const [precioKg,setPrecioKg]=useState(0.40);
  const [tasaConv,setTasaConv]=useState(30);
  const [otrosIng,setOtrosIng]=useState(0);
  const [tab,setTab]=useState("costos");

  // CRUD helpers
  const addH=()=>{setHT([...hTiers,{id:nxH,plan:"",cantidad:10,kgPorRecol:4,frecuencia:4,tarifa:8}]);sNxH(nxH+1);};
  const addE=()=>{setET([...eTiers,{id:nxE,tipo:"",cantidad:1,kgPorRecol:10,frecuencia:4,tarifa:25}]);sNxE(nxE+1);};
  const addA=()=>{setAssets([...assets,{id:nxA,nombre:"",valor:0,vidaAnios:3,residual:0}]);sNxA(nxA+1);};
  const addCC=()=>{setCCerts([...ccerts,{id:nxCC,label:"",on:true,valor:0,anios:3}]);sNxCC(nxCC+1);};

  const servBas=agua+luz;
  const mkt=mktCM+mktPauta;
  const costoTrans=tipoTrans==="publico"?transPub:(combustible+(tipoTrans==="mixto"?transPub:0));
  const mantV=tipoTrans==="publico"?0:mantVeh;

  // ═══ CÁLCULOS ═══
  const R=useMemo(()=>{
    // Clientes y kg
    const hog=hTiers.reduce((s,t)=>s+t.cantidad,0);
    const kgH=hTiers.reduce((s,t)=>s+t.cantidad*t.kgPorRecol*t.frecuencia,0);
    const incH=hTiers.reduce((s,t)=>s+t.cantidad*t.tarifa,0);
    const emp=eTiers.reduce((s,t)=>s+t.cantidad,0);
    const kgE=eTiers.reduce((s,t)=>s+t.cantidad*t.kgPorRecol*t.frecuencia,0);
    const incE=eTiers.reduce((s,t)=>s+t.cantidad*t.tarifa,0);
    const kgM=kgH+kgE;
    const kgComp=kgM*(tasaConv/100);

    // Depreciación activos: (valor - residual) / vida
    const depM=assets.reduce((s,a)=>s+(a.vidaAnios>0?Math.max(a.valor-(a.residual||0),0)/(a.vidaAnios*12):0),0);

    // Amortización: certificaciones activas + custom certs + intangibles fijos
    const certAct=[...certs.filter(c=>c.on),...ccerts.filter(c=>c.on)];
    const amortCert=certAct.reduce((s,c)=>s+(c.anios>0?c.valor/(c.anios*12):0),0);
    const amortFijos=intFijos.filter(i=>i.on).reduce((s,i)=>s+(i.anios>0?i.valor/(i.anios*12):0),0);
    const amortM=amortCert+amortFijos;
    const desgM=depM+amortM;

    // Inversiones
    const invAct=assets.reduce((s,a)=>s+a.valor,0);
    const invIntang=certAct.reduce((s,c)=>s+c.valor,0)+intFijos.filter(i=>i.on).reduce((s,i)=>s+i.valor,0);
    const invT=invAct+invIntang+capTrab;

    // Mano de obra tiempo completo
    const iess=salTC*numTC*0.1115;
    const totSalTC=salTC*numTC+iess;
    const d13=(salTC*numTC)/12;
    const d14=(460/12)*numTC;
    const fRes=(salTC*numTC)/12;
    const vac=(salTC*numTC)/24;
    const benSoc=d13+d14+fRes+vac;
    const costoTC=totSalTC+benSoc; // costo real tiempo completo
    const costoJ=numJ*pagoJ*diasJ; // jornaleros
    const mobraT=costoTC+costoJ;

    // Costos fijos: arriendo + mano obra + servicios + desgaste&amort + marketing + otros
    // NO incluye permisos como campo separado (ya están en certificaciones)
    const cf=arriendo+mobraT+servBas+desgM+mkt+otrosF;

    // Costos variables: transporte + mantenimiento + insumos + baldes + otros
    const cv=costoTrans+mantV+insumos+baldes+otrosV;

    const costoT=cf+cv;

    // Ingresos
    const incSusc=incH+incE;
    const incComp=kgComp*(pctVenta/100)*precioKg;
    const incTotal=incSusc+incComp+otrosIng;

    // Resultados
    const uBruta=incTotal-costoT;
    const mBruto=incTotal>0?(uBruta/incTotal)*100:0;
    const partTrab=uBruta>0?uBruta*0.15:0;
    const impR=incTotal*0.02; // RIMPE
    const uNeta=uBruta-partTrab-impR;
    const mNeto=incTotal>0?(uNeta/incTotal)*100:0;

    // Equilibrio
    const totalCli=hog+emp;
    const costoPorCli=totalCli>0?costoT/totalCli:0;
    const tarifaProm=totalCli>0?incSusc/totalCli:0;
    const tarifaEq=totalCli>0?(costoT-incComp-otrosIng)/totalCli:0;
    const cliEq=tarifaProm>0?(costoT-incComp-otrosIng)/tarifaProm:0;
    const costoPorKg=kgM>0?costoT/kgM:0;

    const mesRec=uNeta>0?invT/uNeta:Infinity;
    const roi=invT>0?((uNeta*12)/invT)*100:0;

    // Proyección
    const proy=[];let ac=-invT;
    for(let m=1;m<=12;m++){
      const cr=1+(m-1)*0.05;
      const hK=hTiers.reduce((s,t)=>s+Math.round(t.cantidad*cr)*t.kgPorRecol*t.frecuencia,0);
      const hI=hTiers.reduce((s,t)=>s+Math.round(t.cantidad*cr)*t.tarifa,0);
      const hN=hTiers.reduce((s,t)=>s+Math.round(t.cantidad*cr),0);
      const eK=eTiers.reduce((s,t)=>s+Math.round(t.cantidad*cr)*t.kgPorRecol*t.frecuencia,0);
      const eI=eTiers.reduce((s,t)=>s+Math.round(t.cantidad*cr)*t.tarifa,0);
      const eN=eTiers.reduce((s,t)=>s+Math.round(t.cantidad*cr),0);
      const kgMM=hK+eK;
      const iM=hI+eI+(kgMM*(tasaConv/100)*(pctVenta/100)*precioKg)+otrosIng;
      const cvM=cv*(cr*0.7+0.3);
      const cM=cf+cvM;
      const uM=iM-cM;ac+=uM;
      proy.push({mes:m,hog:hN,emp:eN,ingreso:iM,costo:cM,util:uM,acum:ac});
    }

    return {hog,emp,kgH,kgE,kgM,kgComp,depM,amortM,desgM,invAct,invIntang,invT,
      iess,totSalTC,d13,d14,fRes,vac,benSoc,costoTC,costoJ,mobraT,
      cf,cv,costoT,incH,incE,incSusc,incComp,incTotal,
      uBruta,mBruto,partTrab,impR,uNeta,mNeto,
      totalCli,costoPorCli,tarifaProm,tarifaEq,cliEq,costoPorKg,
      mesRec,roi,proy};
  },[hTiers,eTiers,numTC,salTC,numJ,pagoJ,diasJ,arriendo,servBas,mkt,otrosF,assets,certs,ccerts,intFijos,costoTrans,mantV,insumos,baldes,otrosV,pctVenta,precioKg,tasaConv,otrosIng,capTrab]);

  const ok=R.uNeta>0;

  // ═══ GENERAR REPORTE TEXTO ═══

    const eDet=eTiers.filter(t=>t.cantidad>0).map(t=>`  ${t.tipo||"Tipo"} (${t.cantidad}): ${FREQ.find(o=>o.value===t.frecuencia)?.label||""} — ${f$(t.tarifa)}/mes c/u`).join("\n");
    const certDet=[...certs.filter(c=>c.on),...ccerts.filter(c=>c.on)].map(c=>`  ${c.label}: ${f$(c.valor)}`).join("\n");
    return [
      `REPORTE FINANCIERO — ${nombre.toUpperCase()}`,
      `Fecha: ${new Date().toLocaleDateString("es-EC")}`,`Contacto: ${email} / ${tel}`,"",
      `═══ CLIENTES ═══`,

      "Hogares:",hDet||"  (ninguno)","",
      R.emp>0?"Empresas:":"",R.emp>0?eDet:"","",
      certDet?`Certificaciones:\n${certDet}`:"","",
      `═══ INGRESOS ═══`,
      `Total mensual: ${f$(R.incTotal)}`,`  Hogares: ${f$(R.incH)}`,`  Empresas: ${f$(R.incE)}`,`  Compost: ${f$(R.incComp)}`,`  Otros: ${f$(otrosIng)}`,"",
      `═══ COSTOS ═══`,
      `Total mensual: ${f$(R.costoT)}`,`  Fijos: ${f$(R.cf)}`,`  Variables: ${f$(R.cv)}`,"",
      `═══ ESTADO DE RESULTADOS ═══`,
      `Ingresos:        ${f$(R.incTotal)}`,
      `(-) Costos:      ${f$(R.costoT)}`,
      `= Utilidad bruta: ${f$(R.uBruta)}`,
      `(-) 15% Particip.: ${f$(R.partTrab)}`,
      `(-) RIMPE 2%:    ${f$(R.impR)}`,
      `= UTILIDAD NETA: ${f$(R.uNeta)}`,
      `Margen neto: ${fN(R.mNeto)}%`,"",
      `═══ INDICADORES ═══`,
      `Costo/cliente: ${f$(R.costoPorCli)} | Costo/kg: ${f$(R.costoPorKg)}`,
      `Punto equilibrio: ${Math.ceil(Math.max(R.cliEq,0))} clientes`,
      `Tarifa equilibrio: ${f$(Math.max(R.tarifaEq,0))}`,
      `Inversión: ${f$(R.invT)} | ROI: ${fN(R.roi)}%`,
      `Recuperación: ${R.mesRec===Infinity?"N/A":fN(R.mesRec)+" meses"}`,"",
      `═══ PROYECCIÓN 12 MESES ═══`,
      "Mes  Hog  Emp  Ingreso     Costo       Utilidad    Acum.",
      ...R.proy.map(p=>`${String(p.mes).padStart(2)}  ${String(p.hog).padStart(4)} ${String(p.emp).padStart(4)}  ${f$(p.ingreso).padStart(10)}  ${f$(p.costo).padStart(10)}  ${f$(p.util).padStart(10)}  ${f$(p.acum).padStart(10)}`),
      "","melanievalencia.com · Herramienta de referencia"
    ].filter(x=>x!==null).join("\n");
  },[nombre,email,tel,hTiers,eTiers,certs,ccerts,R,otrosIng]);

  // ═══ DESCARGAR ═══
  const descargar=useCallback(()=>{
    const txt=generarReporte();
    const b=new Blob([txt],{type:"text/plain;charset=utf-8"});
    const u=URL.createObjectURL(b);
    const a=document.createElement("a");
    a.href=u;a.download=`Reporte_${nombre.replace(/\s+/g,"_")}_${new Date().toISOString().slice(0,10)}.txt`;
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    URL.revokeObjectURL(u);

  // ═══ ENVIAR A GOOGLE SHEETS ═══
  const enviar=useCallback(async()=>{
    if(!nombre.trim())return;

    const payload={

        <button onClick={addCC} style={{width:"100%",padding:"8px",border:`1.5px dashed ${C.leaf}60`,borderRadius:10,background:`${C.leaf}08`,color:C.leaf,fontSize:12,fontWeight:600,cursor:"pointer"}}>+ Otra certificación</button>

        <div style={{marginTop:16,fontSize:13,fontWeight:700,color:C.bark,marginBottom:8}}>Otros gastos iniciales</div>
        {intFijos.map((fi,i)=><label key={fi.id} style={{display:"flex",alignItems:"center",gap:10,marginBottom:8,cursor:"pointer"}}>

          <span style={{fontSize:12,color:C.barkL}}>Amortización: </span><span style={{fontSize:17,fontWeight:700,color:C.leaf,fontFamily:"'DM Mono',monospace"}}>{f$(R.amortM)}/mes</span>

        <Inp label="Pauta publicitaria" value={mktPauta} onChange={setMktP} unit="$/mes"/>
        <Inp label="Otros costos fijos" value={otrosF} onChange={setOtrosF} unit="$/mes"/>
        {otrosF>0&&<Txt label="¿Qué incluyen?" value={otrosFD} onChange={setOtrosFD} placeholder="Seguro, contador..." multiline/>}
        <div style={{background:`${C.bark}0D`,borderRadius:10,padding:"12px 14px",marginTop:8}}>
          <span style={{fontSize:12,color:C.barkL}}>Total fijos: </span><span style={{fontSize:17,fontWeight:700,color:C.bark,fontFamily:"'DM Mono',monospace"}}>{f$(R.cf)}</span>
        </div>
      </Sec>

      <Sec title="Costos variables" icon="⛽" accent={C.barkL}>
        <Sel label="Tipo de transporte" value={tipoTrans} onChange={setTipoTrans} options={TRANS}/>
        {(tipoTrans==="vehiculo"||tipoTrans==="moto"||tipoTrans==="bicicargo"||tipoTrans==="mixto")&&
          <Inp label={tipoTrans==="bicicargo"?"Mantenimiento bici":"Combustible"} value={combustible} onChange={setComb} unit="$/mes"/>}
        {(tipoTrans==="publico"||tipoTrans==="mixto")&&
          <Inp label="Pasajes transporte público" value={transPub} onChange={setTransPub} unit="$/mes" hint="Buses, trole, ecovía"/>}
        {tipoTrans!=="publico"&&<Inp label="Mantenimiento vehículo" value={mantVeh} onChange={setMantVeh} unit="$/mes"/>}
        <Inp label="Insumos compostaje" value={insumos} onChange={setInsumos} unit="$/mes" hint="Material seco, microorganismos"/>
        <Inp label="Baldes / contenedores" value={baldes} onChange={setBaldes} unit="$/mes"/>
        <Inp label="Otros variables" value={otrosV} onChange={setOtrosV} unit="$/mes"/>
        <div style={{background:`${C.barkL}0D`,borderRadius:10,padding:"12px 14px",marginTop:8}}>
          <span style={{fontSize:12,color:C.barkL}}>Total variables: </span><span style={{fontSize:17,fontWeight:700,color:C.barkL,fontFamily:"'DM Mono',monospace"}}>{f$(R.cv)}</span>
        </div>
      </Sec>

      <Sec title="Inversión inicial" icon="🏗️" accent={C.amber}>
        <Inp label="Equipos" value={R.invAct} onChange={()=>{}} unit="$" disabled/>
        <Inp label="Certificaciones + intangibles" value={R.invIntang} onChange={()=>{}} unit="$" disabled/>
        <Inp label="Capital de trabajo" value={capTrab} onChange={setCapTrab} unit="$" hint="Primeros meses"/>
        <div style={{background:`${C.amber}15`,borderRadius:10,padding:"12px 14px",marginTop:8}}>
          <span style={{fontSize:12,color:C.barkL}}>Inversión total: </span><span style={{fontSize:17,fontWeight:700,color:C.amber,fontFamily:"'DM Mono',monospace"}}>{f$(R.invT)}</span>
        </div>
      </Sec>
    </>}

    {tab==="ingresos"&&<>
      <Sec title="Tarifas" icon="💳">
        <IB>💡 Las tarifas se configuran por plan en Costos. Aquí el resumen.</IB>
        <div style={{fontSize:13,fontWeight:700,color:C.earth,marginBottom:8}}>🏠 Hogares ({R.hog})</div>
        {hTiers.filter(t=>t.cantidad>0).map(t=><div key={t.id} style={{display:"flex",justifyContent:"space-between",fontSize:12,padding:"4px 0",color:C.bark}}>
          <span>{t.plan} ({t.cantidad}) — {FREQ.find(o=>o.value===t.frecuencia)?.label} — {f$(t.tarifa)}/mes</span>
          <span style={{fontFamily:"'DM Mono',monospace",fontWeight:600}}>{f$(t.cantidad*t.tarifa)}</span>
        </div>)}
        <div style={{background:C.ghost,borderRadius:10,padding:"10px 14px",margin:"8px 0 16px"}}><span style={{fontSize:12,color:C.barkL}}>Hogares: </span><span style={{fontSize:15,fontWeight:700,color:C.earth,fontFamily:"'DM Mono',monospace"}}>{f$(R.incH)}/mes</span></div>
        {R.emp>0&&<><div style={{fontSize:13,fontWeight:700,color:C.earthL,marginBottom:8}}>🏢 Empresas ({R.emp})</div>
        {eTiers.filter(t=>t.cantidad>0).map(t=><div key={t.id} style={{display:"flex",justifyContent:"space-between",fontSize:12,padding:"4px 0",color:C.bark}}>
          <span>{t.tipo} ({t.cantidad}) — {FREQ.find(o=>o.value===t.frecuencia)?.label} — {f$(t.tarifa)}/mes</span>
          <span style={{fontFamily:"'DM Mono',monospace",fontWeight:600}}>{f$(t.cantidad*t.tarifa)}</span>
        </div>)}
        <div style={{background:C.ghost,borderRadius:10,padding:"10px 14px",margin:"8px 0 16px"}}><span style={{fontSize:12,color:C.barkL}}>Empresas: </span><span style={{fontSize:15,fontWeight:700,color:C.earthL,fontFamily:"'DM Mono',monospace"}}>{f$(R.incE)}/mes</span></div></>}
        <div style={{background:`${C.earth}10`,borderRadius:10,padding:"12px 14px",border:`1px solid ${C.earth}20`}}>
          <span style={{fontSize:12,color:C.barkL}}>Total suscripciones: </span><span style={{fontSize:17,fontWeight:700,color:C.earth,fontFamily:"'DM Mono',monospace"}}>{f$(R.incSusc)}/mes</span>
        </div>
      </Sec>
      <Sec title="Venta de compost" icon="🌿" accent={C.leaf}>
        <Inp label="Conversión residuo → compost" value={tasaConv} onChange={setTasaConv} unit="%" min={10} max={50} hint="25-35%"/>
        <Inp label="% a la venta" value={pctVenta} onChange={setPctV} unit="%" max={100}/>
        <Inp label="Precio/kg" value={precioKg} onChange={setPrecioKg} unit="$/kg" step={0.05} hint="$0.25-0.80"/>
        <div style={{background:`${C.leaf}0D`,borderRadius:10,padding:"12px 14px"}}>
          <div style={{fontSize:12,color:C.barkL}}>{fN(R.kgComp)} kg/mes</div>
          <span style={{fontSize:17,fontWeight:700,color:C.leaf,fontFamily:"'DM Mono',monospace"}}>{f$(R.incComp)}/mes</span>
        </div>
      </Sec>
      <Sec title="Otros" icon="✨" accent={C.amber}><Inp label="Talleres, bonos, consultoría" value={otrosIng} onChange={setOtrosIng} unit="$/mes"/></Sec>
      <div style={{background:`linear-gradient(135deg,${C.earth},${C.leaf})`,borderRadius:16,padding:"20px 18px",color:C.white}}>
        <div style={{fontSize:12,fontWeight:600,opacity:0.8,marginBottom:4}}>INGRESO TOTAL MENSUAL</div>
        <div style={{fontSize:28,fontWeight:700,fontFamily:"'DM Mono',monospace"}}>{f$(R.incTotal)}</div>
      </div>
    </>}

    {(tab==="resultados"||tab==="proyeccion")&&!canView&&
      <Sec title="Desbloquea resultados" icon="🔐">
        <IB>Completa tu info en Costos y envía para ver resultados.</IB>
        {!nombre.trim()&&<p style={{color:C.danger,fontSize:13,fontWeight:600}}>⚠️ Ingresa el nombre de tu empresa primero</p>}
        {nombre.trim()&&<button onClick={enviar} disabled={sending} style={{width:"100%",padding:"14px",border:"none",borderRadius:12,background:sending?"#ccc":`linear-gradient(135deg,${C.earth},${C.leaf})`,color:C.white,fontSize:15,fontWeight:700,cursor:sending?"wait":"pointer",boxShadow:`0 4px 16px ${C.earth}44`}}>
          {sending?"Enviando...":"🚀 Enviar y ver resultados"}
        </button>}
        {sendError&&<p style={{color:C.amber,fontSize:12,marginTop:8}}>{sendError}</p>}
      </Sec>}

    {tab==="resultados"&&canView&&<>
      <Sec title={`Resultados — ${nombre}`} icon="📋">
        {[
          {l:"Ingresos totales",v:R.incTotal,b:true,c:C.earth},
          {l:"  Hogares",v:R.incH,in:true},{l:"  Empresas",v:R.incE,in:true},{l:"  Compost",v:R.incComp,in:true},{l:"  Otros",v:otrosIng,in:true},
          {d:true},
          {l:"(-) Mano obra TC",v:R.costoTC,c:C.danger},{l:"(-) Jornaleros",v:R.costoJ,c:C.danger},
          {l:"(-) Arriendo",v:arriendo,c:C.danger},{l:"(-) Agua+Luz",v:servBas,c:C.danger},
          {l:"(-) Depreciación",v:R.depM,c:C.danger},{l:"(-) Amortización",v:R.amortM,c:C.danger},
          {l:"(-) Marketing",v:mkt,c:C.danger},
          otrosF>0?{l:`(-) ${otrosFD||"Otros fijos"}`,v:otrosF,c:C.danger}:null,
          {l:"(-) Variables",v:R.cv,c:C.danger},
          {d:true},
          {l:"= Utilidad bruta",v:R.uBruta,b:true,c:R.uBruta>=0?C.success:C.danger},
          {l:"(-) 15% Particip.",v:R.partTrab,c:C.barkL},{l:"(-) RIMPE 2%",v:R.impR,c:C.barkL},
          {d:true},
          {l:"= UTILIDAD NETA",v:R.uNeta,b:true,big:true,c:R.uNeta>=0?C.success:C.danger},
        ].filter(Boolean).map((r,i)=>r.d?<div key={i} style={{borderTop:`1px dashed ${C.warm}`,margin:"8px 0"}}/>:
          <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"5px 0",fontSize:r.big?16:r.in?12:13,fontWeight:r.b?700:400,color:r.c||C.soil}}>
            <span>{r.l}</span><span style={{fontFamily:"'DM Mono',monospace",fontWeight:r.b?700:500}}>{f$(r.v)}</span>
          </div>)}
        <div style={{marginTop:12}}><PB label="Margen bruto" value={Math.max(R.mBruto,0)} max={100} color={R.mBruto>20?C.success:C.amber}/><PB label="Margen neto" value={Math.max(R.mNeto,0)} max={100} color={R.mNeto>10?C.success:C.amber}/></div>
      </Sec>

      <Sec title="Indicadores" icon="🎯" accent={C.amber}>
        <div style={{display:"flex",flexWrap:"wrap",gap:10,marginBottom:14}}><MC label="Costo/cliente" value={f$(R.costoPorCli)} sub="mensual" color={C.bark}/><MC label="Costo/kg" value={f$(R.costoPorKg)} sub="residuo" color={C.barkL}/></div>
        <div style={{display:"flex",flexWrap:"wrap",gap:10}}><MC label="ROI anual" value={`${fN(R.roi)}%`} color={R.roi>0?C.success:C.danger}/><MC label="Recuperación" value={R.mesRec===Infinity?"N/A":`${fN(R.mesRec)} meses`} color={R.mesRec<=12?C.success:C.amber}/></div>
      </Sec>

      <Sec title="Punto de equilibrio" icon="⚖️">
        <div style={{display:"flex",flexWrap:"wrap",gap:10,marginBottom:16}}>
          <MC label="Clientes mínimos" value={Math.ceil(Math.max(R.cliEq,0))} sub={`tarifa prom ${f$(R.tarifaProm)}`} color={R.totalCli>=R.cliEq?C.success:C.danger} large/>
          <MC label="Tarifa equilibrio" value={f$(Math.max(R.tarifaEq,0))} sub={`con ${R.totalCli} clientes`} color={R.tarifaProm>=R.tarifaEq?C.success:C.danger} large/>
        </div>
        <div style={{marginTop:16,padding:"14px",background:ok?`${C.success}10`:`${C.danger}10`,borderRadius:12,border:`1px solid ${ok?C.success:C.danger}30`}}>
          <div style={{fontSize:14,fontWeight:700,color:ok?C.success:C.danger,marginBottom:4}}>{ok?"✅ Rentable":"⚠️ Aún no rentable"}</div>
          <div style={{fontSize:12,color:C.barkL}}>{ok?`${R.totalCli} clientes → ${f$(R.uNeta)} netos/mes.`:`Necesitas ${Math.ceil(Math.max(R.cliEq,0))} clientes o ajustar tarifas.`}</div>
        </div>
      </Sec>

      <button onClick={descargar} style={{width:"100%",padding:"16px",border:"none",borderRadius:14,background:`linear-gradient(135deg,${C.earth},${C.leaf})`,color:C.white,fontSize:15,fontWeight:700,cursor:"pointer",marginBottom:16,boxShadow:`0 4px 16px ${C.earth}44`}}>📥 Descargar reporte de {nombre}</button>
    </>}

    {tab==="proyeccion"&&canView&&<>
      <Sec title="Proyección 12 meses" icon="📈">
        <p style={{fontSize:12,color:C.barkL,margin:"0 0 14px"}}>Crecimiento 5%/mes en clientes.</p>
        <div style={{fontSize:13,fontWeight:600,color:C.bark,marginBottom:10}}>Utilidad mensual</div>
        <BC data={R.proy.map(p=>({label:`M${p.mes}`,value:Math.max(p.util,0),hl:p.util<0}))} color={C.leaf} height={140}/>
        <div style={{marginTop:20,fontSize:13,fontWeight:600,color:C.bark,marginBottom:10}}>Flujo acumulado</div>
        <BC data={R.proy.map(p=>({label:`M${p.mes}`,value:Math.max(p.acum,0),hl:p.acum<0}))} color={C.earth} height={140}/>
        <div style={{overflowX:"auto",marginTop:16}}>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:11,fontFamily:"'DM Mono',monospace"}}>
            <thead><tr style={{borderBottom:`2px solid ${C.warm}`}}>{["Mes","Hog","Emp","Ingreso","Costo","Util.","Acum."].map(h=><th key={h} style={{padding:"6px 4px",textAlign:"right",fontSize:10,fontWeight:600,color:C.barkL}}>{h}</th>)}</tr></thead>
            <tbody>{R.proy.map(p=><tr key={p.mes} style={{borderBottom:`1px solid ${C.ghost}`}}>
              <td style={{padding:"5px 4px",textAlign:"right",fontWeight:600}}>{p.mes}</td>
              <td style={{padding:"5px 4px",textAlign:"right"}}>{p.hog}</td>
              <td style={{padding:"5px 4px",textAlign:"right"}}>{p.emp}</td>
              <td style={{padding:"5px 4px",textAlign:"right",color:C.earth}}>{f$(p.ingreso)}</td>
              <td style={{padding:"5px 4px",textAlign:"right",color:C.danger}}>{f$(p.costo)}</td>
              <td style={{padding:"5px 4px",textAlign:"right",color:p.util>=0?C.success:C.danger,fontWeight:600}}>{f$(p.util)}</td>
              <td style={{padding:"5px 4px",textAlign:"right",color:p.acum>=0?C.success:C.danger,fontWeight:600}}>{f$(p.acum)}</td>
            </tr>)}</tbody>
          </table>
        </div>
      </Sec>
      <Sec title="Resumen anual" icon="🗓️" accent={C.amber}>
        <div style={{display:"flex",flexWrap:"wrap",gap:10}}><MC label="Ingreso anual" value={f$(R.proy.reduce((s,p)=>s+p.ingreso,0))} color={C.earth} large/><MC label="Utilidad anual" value={f$(R.proy.reduce((s,p)=>s+p.util,0))} color={R.proy.reduce((s,p)=>s+p.util,0)>0?C.success:C.danger} large/></div>
      </Sec>
      <button onClick={descargar} style={{width:"100%",padding:"16px",border:"none",borderRadius:14,marginTop:16,background:`linear-gradient(135deg,${C.earth},${C.leaf})`,color:C.white,fontSize:15,fontWeight:700,cursor:"pointer",boxShadow:`0 4px 16px ${C.earth}44`}}>📥 Descargar reporte de {nombre}</button>
    </>}

    </div>
    <div style={{padding:"20px 16px 32px",textAlign:"center"}}>
      <div style={{fontSize:10,color:C.barkL}}>Herramienta de referencia · No constituye asesoría contable<br/>melanievalencia.com · Quito, 2025</div>
    </div>
  </div>;
}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>

function Inp({label,value,onChange,unit,hint,min=0,step=1,max,disabled}){
  return <div style={{marginBottom:14}}>
    <label style={{display:"block",fontSize:13,fontWeight:600,color:C.bark,marginBottom:3}}>{label}</label>
    <div style={{display:"flex",alignItems:"center",gap:6}}>
      <input type="number" value={value} onChange={e=>onChange(Number(e.target.value))} min={min} step={step} max={max} disabled={disabled}
        style={{width:"100%",padding:"9px 11px",border:`1.5px solid ${C.warm}`,borderRadius:10,fontSize:15,fontFamily:"'DM Mono',monospace",color:disabled?C.barkL:C.soil,background:disabled?"#f5f0e8":C.white,outline:"none"}}/>
      {unit&&<span style={{fontSize:12,color:C.barkL,whiteSpace:"nowrap"}}>{unit}</span>}
    </div>
    {hint&&<span style={{fontSize:11,color:C.barkL,marginTop:2,display:"block"}}>{hint}</span>}
  </div>;
}
function Txt({label,value,onChange,placeholder,multiline,hint}){

  return <div style={{marginBottom:14}}>
    <label style={{display:"block",fontSize:13,fontWeight:600,color:C.bark,marginBottom:3}}>{label}</label>
    {multiline?<textarea value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} rows={2} style={s}/>
    :<input type="text" value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} style={s}/>}
    {hint&&<span style={{fontSize:11,color:C.barkL,marginTop:2,display:"block"}}>{hint}</span>}
  </div>;
}
function Sel({label,value,onChange,options}){

}

function BC({data,color=C.leaf,height=140}){
  const mx=Math.max(...data.map(d=>d.value),1);
  return <div style={{display:"flex",alignItems:"flex-end",gap:4,height,padding:"0 2px"}}>
    {data.map((d,i)=><div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",height:"100%"}}>
      <div style={{flex:1,width:"100%",display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
        <div style={{width:"72%",maxWidth:44,height:`${Math.max((d.value/mx)*100,2)}%`,background:d.hl?C.amber:`linear-gradient(180deg,${color},${color}BB)`,borderRadius:"5px 5px 2px 2px",position:"relative"}}>
          <span style={{position:"absolute",top:-16,left:"50%",transform:"translateX(-50%)",fontSize:8,fontWeight:600,color:C.bark,whiteSpace:"nowrap",fontFamily:"'DM Mono',monospace"}}>{f$(d.value)}</span>
        </div>

function PB({value,max,label,color}){

}
function IB({children,color=C.earth}){return <div style={{background:`${color}0A`,borderRadius:10,padding:"9px 12px",marginBottom:10,border:`1px dashed ${color}30`,fontSize:12,color:C.barkL,lineHeight:1.5}}>{children}</div>;}
function AssetCard({a,onChange,onRemove,showRes}){
  const dep=a.vidaAnios>0?Math.max(a.valor-(a.residual||0),0)/(a.vidaAnios*12):0;

      </div>}

    <div style={{fontSize:10,color:C.barkL,borderTop:`1px dashed ${C.warm}`,paddingTop:3,display:"flex",justifyContent:"space-between"}}>
      <span>{a.nombre||"—"}</span><span><strong style={{color:C.earth}}>{f$(Math.max(dep,0))}/mes</strong></span>
    </div>
  </div>;
}
function TierCard({t,onChange,onRemove,nLabel,nField,cLabel}){
  return <div style={{background:C.ghost,borderRadius:10,padding:"12px 12px 6px",marginBottom:10,position:"relative"}}>
    <button onClick={onRemove} style={{position:"absolute",top:8,right:8,width:24,height:24,border:"none",borderRadius:5,background:`${C.danger}15`,color:C.danger,cursor:"pointer",fontSize:13,display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 10px"}}>
      <div style={{gridColumn:"1/-1",marginBottom:8,paddingRight:28}}>
        <label style={{fontSize:10,fontWeight:600,color:C.barkL}}>{nLabel}</label>
        <input type="text" value={t[nField]} placeholder="Nombre..." onChange={e=>onChange({...t,[nField]:e.target.value})}
          style={{width:"100%",padding:"7px 9px",border:`1.5px solid ${C.warm}`,borderRadius:7,fontSize:12,color:C.soil,background:C.white,outline:"none",boxSizing:"border-box"}}/>
      </div>
      {[{l:cLabel,k:"cantidad",s:1},{l:"Kg/recol.",k:"kgPorRecol",s:0.5}].map(f=><div key={f.k} style={{marginBottom:8}}>
        <label style={{fontSize:10,fontWeight:600,color:C.barkL}}>{f.l}</label>
        <input type="number" value={t[f.k]} min={0} step={f.s} onChange={e=>onChange({...t,[f.k]:Number(e.target.value)})}
          style={{width:"100%",padding:"7px 9px",border:`1.5px solid ${C.warm}`,borderRadius:7,fontSize:12,fontFamily:"'DM Mono',monospace",color:C.soil,background:C.white,outline:"none",boxSizing:"border-box"}}/>
      </div>)}
      <div style={{marginBottom:8}}>
        <label style={{fontSize:10,fontWeight:600,color:C.barkL}}>Frecuencia</label>
        <select value={t.frecuencia} onChange={e=>onChange({...t,frecuencia:Number(e.target.value)})}
          style={{width:"100%",padding:"7px 9px",border:`1.5px solid ${C.warm}`,borderRadius:7,fontSize:11,color:C.soil,background:C.white,outline:"none",boxSizing:"border-box"}}>
          {FREQ.map(o=><option key={o.value} value={o.value}>{o.label}</option>)}
        </select>
      </div>
      <div style={{marginBottom:8}}>
        <label style={{fontSize:10,fontWeight:600,color:C.barkL}}>Tarifa $/mes</label>
        <input type="number" value={t.tarifa} min={0} step={0.5} onChange={e=>onChange({...t,tarifa:Number(e.target.value)})}
          style={{width:"100%",padding:"7px 9px",border:`1.5px solid ${C.warm}`,borderRadius:7,fontSize:12,fontFamily:"'DM Mono',monospace",color:C.soil,background:C.white,outline:"none",boxSizing:"border-box"}}/>
      </div>
    </div>
    <div style={{fontSize:10,color:C.barkL,borderTop:`1px dashed ${C.warm}`,paddingTop:4,display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:3}}>
      <span>{t.cantidad}×{fN(t.kgPorRecol)}kg×{t.frecuencia}x = <strong style={{color:C.earth}}>{fN(t.cantidad*t.kgPorRecol*t.frecuencia)} kg/mes</strong></span>
      <span><strong style={{color:C.earth}}>{f$(t.cantidad*t.tarifa)}/mes</strong></span>
    </div>
  </div>;
}

const TABS=[{id:"costos",label:"Costos"},{id:"ingresos",label:"Ingresos"},{id:"resultados",label:"Resultados"}];

function App(){
  const [nombre,setNombre]=useState("");
  const [email,setEmail]=useState("");
  const [tel,setTel]=useState("");
  const [submitted,setSub]=useState(false);
  const [sending,setSending]=useState(false);
  const [sendError,setSendError]=useState("");

  const [hTiers,setHT]=useState([
    {id:1,plan:"Semanal",cantidad:50,kgPorRecol:4,frecuencia:4,tarifa:10},
    {id:2,plan:"Quincenal",cantidad:25,kgPorRecol:5,frecuencia:2,tarifa:7},
    {id:3,plan:"Mensual",cantidad:10,kgPorRecol:6,frecuencia:1,tarifa:5},
  ]);
  const [nxH,sNxH]=useState(4);
  const [eTiers,setET]=useState([
    {id:1,tipo:"Restaurantes",cantidad:3,kgPorRecol:20,frecuencia:4,tarifa:40},
    {id:2,tipo:"Oficinas",cantidad:2,kgPorRecol:8,frecuencia:2,tarifa:20},
  ]);
  const [nxE,sNxE]=useState(3);
  const [numTC,setNumTC]=useState(1);
  const [salTC,setSalTC]=useState(482);
  const [numJ,setNumJ]=useState(2);
  const [pagoJ,setPagoJ]=useState(20);
  const [diasJ,setDiasJ]=useState(8);
  // Tiempo parcial (medio tiempo = 4h/día, con IESS proporcional)
  const [numTP,setNumTP]=useState(0);
  const [salTP,setSalTP]=useState(241); // SBU/2 para medio tiempo
  const [horasTP,setHorasTP]=useState(4); // horas diarias
  const [arriendo,setArr]=useState(250);
  const [agua,setAgua]=useState(15);
  const [luz,setLuz]=useState(25);
  const [mktCM,setMktCM]=useState(30);
  const [mktP,setMktP]=useState(20);
  const [otrosF,setOtrosF]=useState(0);
  const [otrosFD,setOtrosFD]=useState("");
  const [assets,setAssets]=useState([
    {id:1,nombre:"Vehículo (camioneta/furgón)",valor:8000,vidaAnios:5,residual:2000},
    {id:2,nombre:"Compostera",valor:800,vidaAnios:5,residual:0},
    {id:3,nombre:"Herramientas",valor:300,vidaAnios:3,residual:0},
    {id:4,nombre:"Baldes",valor:400,vidaAnios:2,residual:0},
    {id:5,nombre:"Adecuación espacio",valor:500,vidaAnios:5,residual:0},
  ]);
  const [nxA,sNxA]=useState(6);
  const [certs,setCerts]=useState(CERTS_DEF.map(c=>({...c})));
  const [ccerts,setCCerts]=useState([]);
  const [nxCC,sNxCC]=useState(1);
  const [intF,setIF]=useState(INTANG_FIJOS.map(i=>({...i})));
  const [capTrab,setCapTrab]=useState(1500);
  const [tipoTr,setTipoTr]=useState("vehiculo");
  const [comb,setComb]=useState(80);
  const [trPub,setTrPub]=useState(0);
  const [mantV,setMantV]=useState(40);
  const [insumos,setInsumos]=useState(35);
  const [baldes,setBaldes]=useState(20);
  const [otrosV,setOtrosV]=useState(0);
  const [otrosVD,setOtrosVD]=useState("");
  const [kgVend,setKgVend]=useState(200); // kg de compost vendidos por mes
  const [precKg,setPrecKg]=useState(0.40);
  const [tasaC,setTasaC]=useState(30);
  const [otrosIng,setOtrosIng]=useState(0);
  const [tab,setTab]=useState("costos");

  const servBas=agua+luz;const mkt=mktCM+mktP;
  const costoTr=tipoTr==="publico"?trPub:(comb+(tipoTr==="mixto"?trPub:0));
  const mntV=tipoTr==="publico"?0:mantV;

  const R=useMemo(()=>{
    const hog=hTiers.reduce((s,t)=>s+t.cantidad,0);
    const kgH=hTiers.reduce((s,t)=>s+t.cantidad*t.kgPorRecol*t.frecuencia,0);
    const incH=hTiers.reduce((s,t)=>s+t.cantidad*t.tarifa,0);
    const emp=eTiers.reduce((s,t)=>s+t.cantidad,0);
    const kgE=eTiers.reduce((s,t)=>s+t.cantidad*t.kgPorRecol*t.frecuencia,0);
    const incE=eTiers.reduce((s,t)=>s+t.cantidad*t.tarifa,0);
    const kgM=kgH+kgE;const kgComp=kgM*(tasaC/100);
    const depM=assets.reduce((s,a)=>s+(a.vidaAnios>0?Math.max(a.valor-(a.residual||0),0)/(a.vidaAnios*12):0),0);
    const certAct=[...certs.filter(c=>c.on),...ccerts.filter(c=>c.on)];
    const amortM=certAct.reduce((s,c)=>s+(c.anios>0?c.valor/(c.anios*12):0),0)+intF.filter(i=>i.on).reduce((s,i)=>s+(i.anios>0?i.valor/(i.anios*12):0),0);
    const desgM=depM+amortM;
    const invAct=assets.reduce((s,a)=>s+a.valor,0);
    const invInt=certAct.reduce((s,c)=>s+c.valor,0)+intF.filter(i=>i.on).reduce((s,i)=>s+i.valor,0);
    const invT=invAct+invInt+capTrab;
    const iess=salTC*numTC*0.1115;const totSal=salTC*numTC+iess;
    const d13=(salTC*numTC)/12;const d14=(482/12)*numTC;const fRes=(salTC*numTC)/12;const vac=(salTC*numTC)/24;
    const ben=d13+d14+fRes+vac;const costoTC=totSal+ben;
    // Tiempo parcial: IESS proporcional, beneficios proporcionales
    const iessTP=salTP*numTP*0.1115;const totSalTP=salTP*numTP+iessTP;
    const d13tp=(salTP*numTP)/12;const d14tp=(482*(horasTP/8)/12)*numTP;
    const fResTP=(salTP*numTP)/12;const vacTP=(salTP*numTP)/24;
    const benTP=d13tp+d14tp+fResTP+vacTP;const costoTPtotal=totSalTP+benTP;
    const costoJ=numJ*pagoJ*diasJ;
    const mobra=costoTC+costoTPtotal+costoJ;
    const cf=arriendo+mobra+servBas+desgM+mkt+otrosF;
    const cv=costoTr+mntV+insumos+baldes+otrosV;
    const costoT=cf+cv;
    const incSusc=incH+incE;const incComp=Math.min(kgVend,kgComp)*precKg;const incTotal=incSusc+incComp+otrosIng;
    const uBruta=incTotal-costoT;const mBruto=incTotal>0?(uBruta/incTotal)*100:0;
    const partT=uBruta>0?uBruta*0.15:0;const impR=incTotal*0.02;const uNeta=uBruta-partT-impR;
    const mNeto=incTotal>0?(uNeta/incTotal)*100:0;
    const totalCli=hog+emp;const costoCli=totalCli>0?costoT/totalCli:0;
    const tarProm=totalCli>0?incSusc/totalCli:0;const tarEq=totalCli>0?(costoT-incComp-otrosIng)/totalCli:0;
    const cliEq=tarProm>0?(costoT-incComp-otrosIng)/tarProm:0;const costoKg=kgM>0?costoT/kgM:0;
    const mesRec=uNeta>0?invT/uNeta:Infinity;const roi=invT>0?((uNeta*12)/invT)*100:0;
    const proy=[];let ac=-invT;
    for(let m=1;m<=12;m++){const cr=1+(m-1)*0.05;
      const hK=hTiers.reduce((s,t)=>s+Math.round(t.cantidad*cr)*t.kgPorRecol*t.frecuencia,0);

        {addBtn(C.earthL,()=>{setET([...eTiers,{id:nxE,tipo:"",cantidad:1,kgPorRecol:10,frecuencia:4,tarifa:25}]);sNxE(nxE+1);},"+ Tipo")}

        <Sel label="Transporte" value={tipoTr} onChange={setTipoTr} options={TRANS}/>
        {tipoTr!=="publico"&&<Inp label={tipoTr==="bicicargo"?"Mant. bici":"Combustible"} value={comb} onChange={setComb} unit="$/mes"/>}
        {(tipoTr==="publico"||tipoTr==="mixto")&&<Inp label="Pasajes bus/trole" value={trPub} onChange={setTrPub} unit="$/mes"/>}
        {tipoTr!=="publico"&&<Inp label="Mant. vehículo" value={mantV} onChange={setMantV} unit="$/mes"/>}
        <Inp label="Insumos compostaje" value={insumos} onChange={setInsumos} unit="$/mes"/>
        <Inp label="Baldes" value={baldes} onChange={setBaldes} unit="$/mes"/>
        <Inp label="Otros" value={otrosV} onChange={setOtrosV} unit="$/mes"/>
        {otrosV>0&&<Txt label="¿Qué incluyen?" value={otrosVD} onChange={setOtrosVD} placeholder="Ej: empaques, análisis de laboratorio, fumigación..."/>}
      </Sec>
      <Sec title="Inversión" icon="🏗️" accent={C.amber}>
        <Inp label="Equipos" value={R.invAct} onChange={()=>{}} unit="$" disabled/>
        <Inp label="Intangibles" value={R.invInt} onChange={()=>{}} unit="$" disabled/>
        <Inp label="Capital trabajo" value={capTrab} onChange={setCapTrab} unit="$"/>
        <div style={{background:`${C.amber}15`,borderRadius:8,padding:"10px 12px",marginTop:6}}>
          <span style={{fontSize:12,color:C.barkL}}>Total: </span><span style={{fontSize:16,fontWeight:700,color:C.amber,fontFamily:"'DM Mono',monospace"}}>{f$(R.invT)}</span>
        </div>
      </Sec>
      {!nombre.trim()&&<div style={{background:`${C.amber}10`,borderRadius:12,padding:"14px",marginTop:14,border:`1px solid ${C.amber}30`,textAlign:"center"}}>
        <span style={{fontSize:13,color:C.bark,fontWeight:600}}>⚠️ No olvides poner el nombre de tu iniciativa arriba para poder ver tus resultados</span>
      </div>}
      <button onClick={()=>setTab("ingresos")} style={{width:"100%",padding:"15px",border:"none",borderRadius:13,marginTop:nombre.trim()?14:8,background:`linear-gradient(135deg,${C.earth},${C.leaf})`,color:C.white,fontSize:15,fontWeight:700,cursor:"pointer",boxShadow:`0 4px 14px ${C.earth}44`}}>
        Llenar Ingresos →
      </button>
    </>}

    {tab==="ingresos"&&<>
      <Sec title="Tarifas" icon="💳">
        <IB>💡 Configuradas por plan en Costos.</IB>
        <div style={{fontSize:12,fontWeight:700,color:C.earth,marginBottom:6}}>🏠 Hogares ({R.hog})</div>
        {hTiers.filter(t=>t.cantidad>0).map(t=><div key={t.id} style={{display:"flex",justifyContent:"space-between",fontSize:11,padding:"3px 0",color:C.bark}}>
          <span>{t.plan} ({t.cantidad}) — {FREQ.find(o=>o.value===t.frecuencia)?.label}</span>
          <span style={{fontFamily:"'DM Mono',monospace",fontWeight:600}}>{f$(t.cantidad*t.tarifa)}</span>
        </div>)}
        <div style={{background:C.ghost,borderRadius:8,padding:"8px 12px",margin:"6px 0 12px"}}><span style={{fontSize:12,color:C.barkL}}>Hogares: </span><span style={{fontSize:14,fontWeight:700,color:C.earth,fontFamily:"'DM Mono',monospace"}}>{f$(R.incH)}/mes</span></div>
        {R.emp>0&&<><div style={{fontSize:12,fontWeight:700,color:C.earthL,marginBottom:6}}>🏢 Empresas ({R.emp})</div>
        {eTiers.filter(t=>t.cantidad>0).map(t=><div key={t.id} style={{display:"flex",justifyContent:"space-between",fontSize:11,padding:"3px 0",color:C.bark}}>
          <span>{t.tipo} ({t.cantidad}) — {FREQ.find(o=>o.value===t.frecuencia)?.label}</span>
          <span style={{fontFamily:"'DM Mono',monospace",fontWeight:600}}>{f$(t.cantidad*t.tarifa)}</span>
        </div>)}
        <div style={{background:C.ghost,borderRadius:8,padding:"8px 12px",margin:"6px 0 12px"}}><span style={{fontSize:12,color:C.barkL}}>Empresas: </span><span style={{fontSize:14,fontWeight:700,color:C.earthL,fontFamily:"'DM Mono',monospace"}}>{f$(R.incE)}/mes</span></div></>}
      </Sec>
      <Sec title="Compost" icon="🌿" accent={C.leaf}>
        <Inp label="Conversión %" value={tasaC} onChange={setTasaC} unit="%" min={10} max={50}/>
        <Inp label="Kg de compost vendidos/mes" value={kgVend} onChange={setKgVend} unit="kg/mes" min={0} hint={`Produces ${fN(R.kgComp)} kg/mes. El resto puede ser donación o autoconsumo.`}/>
        <Inp label="$/kg" value={precKg} onChange={setPrecKg} unit="$/kg" step={0.05}/>
        <div style={{background:`${C.leaf}0D`,borderRadius:8,padding:"10px 12px"}}>
          <span style={{fontSize:16,fontWeight:700,color:C.leaf,fontFamily:"'DM Mono',monospace"}}>{f$(R.incComp)}/mes</span>
          <span style={{fontSize:11,color:C.barkL}}> ({fN(R.kgComp)} kg)</span>
        </div>
      </Sec>
      <Sec title="Otros" icon="✨" accent={C.amber}><Inp label="Talleres, bonos" value={otrosIng} onChange={setOtrosIng} unit="$/mes"/></Sec>
      <div style={{background:`linear-gradient(135deg,${C.earth},${C.leaf})`,borderRadius:14,padding:"18px 16px",color:C.white}}>
        <div style={{fontSize:11,fontWeight:600,opacity:0.8,marginBottom:3}}>INGRESO TOTAL</div>
        <div style={{fontSize:26,fontWeight:700,fontFamily:"'DM Mono',monospace"}}>{f$(R.incTotal)}/mes</div>
      </div>
      {!nombre.trim()&&<div style={{background:`${C.amber}10`,borderRadius:12,padding:"14px",marginTop:14,border:`1px solid ${C.amber}30`,textAlign:"center"}}>
        <span style={{fontSize:13,color:C.bark,fontWeight:600}}>⚠️ Pon el nombre de tu iniciativa en la pestaña de Costos para ver resultados</span>
      </div>}
      {nombre.trim()&&<button onClick={()=>{enviar();setTab("resultados");}} disabled={sending} style={{width:"100%",padding:"15px",border:"none",borderRadius:13,marginTop:14,background:sending?"#ccc":`linear-gradient(135deg,${C.earth},${C.leaf})`,color:C.white,fontSize:15,fontWeight:700,cursor:sending?"wait":"pointer",boxShadow:`0 4px 14px ${C.earth}44`}}>
        {sending?"Enviando...":"🚀 Ver resultados"}
      </button>}
      {sendError&&<p style={{color:C.amber,fontSize:12,textAlign:"center",marginTop:6}}>{sendError}</p>}
    </>}

    {tab==="resultados"&&!canView&&
      <Sec title="Desbloquea resultados" icon="🔐">
        <IB>Completa tus datos en Costos (incluyendo el nombre de tu iniciativa) y llena Ingresos. Luego presiona "Ver resultados" en la pestaña de Ingresos.</IB>
        {!nombre.trim()&&<p style={{color:C.danger,fontSize:13,fontWeight:600}}>⚠️ Falta el nombre de tu iniciativa</p>}
        {nombre.trim()&&<button onClick={()=>{enviar();}} disabled={sending} style={{width:"100%",padding:"14px",border:"none",borderRadius:12,background:sending?"#ccc":`linear-gradient(135deg,${C.earth},${C.leaf})`,color:C.white,fontSize:15,fontWeight:700,cursor:sending?"wait":"pointer",boxShadow:`0 4px 14px ${C.earth}44`}}>
          {sending?"Enviando...":"🚀 Enviar y ver resultados"}
        </button>}
      </Sec>}

    {tab==="resultados"&&canView&&<>
      <Sec title={`Resultados — ${nombre}`} icon="📋">
        {[
          {l:"Ingresos",v:R.incTotal,b:true,c:C.earth},
          {l:"  Hogares",v:R.incH,n:true},{l:"  Empresas",v:R.incE,n:true},{l:"  Compost",v:R.incComp,n:true},{l:"  Otros",v:otrosIng,n:true},
          {d:true},
          {l:"(-) Mano obra TC",v:R.costoTC,c:C.danger},{l:"(-) Tiempo parcial",v:R.costoTPtotal,c:C.danger},{l:"(-) Jornaleros",v:R.costoJ,c:C.danger},
          {l:"(-) Arriendo",v:arriendo,c:C.danger},{l:"(-) Agua+Luz",v:servBas,c:C.danger},
          {l:"(-) Depreciación",v:R.depM,c:C.danger},{l:"(-) Amortización",v:R.amortM,c:C.danger},
          {l:"(-) Marketing",v:mkt,c:C.danger},
          otrosF>0?{l:`(-) ${otrosFD||"Otros"}`,v:otrosF,c:C.danger}:null,
          {l:"(-) Variables",v:R.cv,c:C.danger},{d:true},
          {l:"= Ut. bruta",v:R.uBruta,b:true,c:R.uBruta>=0?C.success:C.danger},
          {l:"(-) 15% Particip.",v:R.partT,c:C.barkL},{l:"(-) RIMPE 2%",v:R.impR,c:C.barkL},{d:true},
          {l:"= UTILIDAD NETA",v:R.uNeta,b:true,big:true,c:R.uNeta>=0?C.success:C.danger},
        ].filter(Boolean).map((r,i)=>r.d?<div key={i} style={{borderTop:`1px dashed ${C.warm}`,margin:"6px 0"}}/>:
          <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"4px 0",fontSize:r.big?15:r.n?11:12,fontWeight:r.b?700:400,color:r.c||C.soil}}>
            <span>{r.l}</span><span style={{fontFamily:"'DM Mono',monospace"}}>{f$(r.v)}</span>
          </div>)}
        <div style={{marginTop:10}}><PB label="Margen bruto" value={Math.max(R.mBruto,0)} max={100} color={R.mBruto>20?C.success:C.amber}/><PB label="Margen neto" value={Math.max(R.mNeto,0)} max={100} color={R.mNeto>10?C.success:C.amber}/></div>
      </Sec>
      <Sec title="Indicadores" icon="🎯" accent={C.amber}>
        <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:10}}><MC label="Costo/cli" value={f$(R.costoCli)} color={C.bark}/><MC label="Costo/kg" value={f$(R.costoKg)} color={C.barkL}/></div>
        <div style={{display:"flex",flexWrap:"wrap",gap:8}}><MC label="ROI" value={`${fN(R.roi)}%`} color={R.roi>0?C.success:C.danger}/><MC label="Recup." value={R.mesRec===Infinity?"N/A":`${fN(R.mesRec)}m`} color={R.mesRec<=12?C.success:C.amber}/></div>
      </Sec>
      <Sec title="Equilibrio" icon="⚖️">
        <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:12}}>
          <MC label="Clientes mín." value={Math.ceil(Math.max(R.cliEq,0))} color={R.totalCli>=R.cliEq?C.success:C.danger} large/>
          <MC label="Tarifa eq." value={f$(Math.max(R.tarEq,0))} color={R.tarProm>=R.tarEq?C.success:C.danger} large/>
        </div>
        <div style={{padding:"12px",background:ok?`${C.success}10`:`${C.danger}10`,borderRadius:10,border:`1px solid ${ok?C.success:C.danger}30`}}>
          <div style={{fontSize:13,fontWeight:700,color:ok?C.success:C.danger}}>{ok?"✅ Rentable":"⚠️ Aún no"}</div>
          <div style={{fontSize:11,color:C.barkL,marginTop:3}}>{ok?`${R.totalCli} clientes → ${f$(R.uNeta)} netos/mes`:`Necesitas ${Math.ceil(Math.max(R.cliEq,0))} clientes`}</div>
        </div>
      </Sec>

      {/* EMISIONES GEI EVITADAS */}
      <Sec title="Impacto ambiental" icon="" accent={C.leaf}>
        <IB color={C.leaf}>Emisiones de GEI evitadas al desviar residuos orgánicos del relleno sanitario al compostaje. Cálculo con <strong>modelo FOD completo del IPCC</strong> (First Order Decay, Vol.5 Ch.3, 2006/2019 Refinement) con parámetros calibrados para Quito.</IB>

        <div style={{fontSize:13,fontWeight:700,color:C.bark,marginBottom:10}}>Desglose por gas (anual)</div>

        {/* Tabla de gases */}
        <div style={{background:C.ghost,borderRadius:10,padding:"14px",marginBottom:12}}>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
            <thead>
              <tr style={{borderBottom:`2px solid ${C.warm}`}}>
                <th style={{textAlign:"left",padding:"4px 0",fontSize:11,color:C.barkL,fontWeight:600}}>Gas</th>
                <th style={{textAlign:"right",padding:"4px 0",fontSize:11,color:C.barkL,fontWeight:600}}>Cantidad/año</th>
                <th style={{textAlign:"right",padding:"4px 0",fontSize:11,color:C.barkL,fontWeight:600}}>tCO₂eq/año</th>
              </tr>
            </thead>
            <tbody>
              <tr style={{borderBottom:`1px solid ${C.warm}`}}>
                <td style={{padding:"6px 0",color:C.bark}}>CH₄ evitado (relleno)</td>
                <td style={{padding:"6px 0",textAlign:"right",fontFamily:"'DM Mono',monospace",color:C.earth,fontWeight:600}}>+{fN(R.ch4EvitadoAnio)} t CH₄</td>
                <td style={{padding:"6px 0",textAlign:"right",fontFamily:"'DM Mono',monospace",color:C.earth,fontWeight:600}}>+{fN(R.ch4EvitadoAnio*28)}</td>
              </tr>
              <tr style={{borderBottom:`1px solid ${C.warm}`}}>
                <td style={{padding:"6px 0",color:C.bark}}>CH₄ emitido (compostaje)</td>
                <td style={{padding:"6px 0",textAlign:"right",fontFamily:"'DM Mono',monospace",color:C.danger}}>−{fN(R.ch4CompostajeAnio)} t CH₄</td>
                <td style={{padding:"6px 0",textAlign:"right",fontFamily:"'DM Mono',monospace",color:C.danger}}>−{fN(R.ch4CompostajeAnio*28)}</td>
              </tr>
              <tr style={{borderBottom:`1px solid ${C.warm}`}}>
                <td style={{padding:"6px 0",color:C.bark}}>N₂O emitido (compostaje)</td>
                <td style={{padding:"6px 0",textAlign:"right",fontFamily:"'DM Mono',monospace",color:C.danger}}>−{fN(R.n2oCompostajeAnio)} t N₂O</td>
                <td style={{padding:"6px 0",textAlign:"right",fontFamily:"'DM Mono',monospace",color:C.danger}}>−{fN(R.n2oCo2eq)}</td>
              </tr>
              <tr style={{borderBottom:`1px solid ${C.warm}`}}>
                <td style={{padding:"6px 0",color:C.barkL,fontSize:11}}>CO₂ biogénico (compostaje)*</td>
                <td style={{padding:"6px 0",textAlign:"right",fontFamily:"'DM Mono',monospace",color:C.barkL,fontSize:11}}>{fN(R.co2BiogenicoAnio)} t CO₂</td>
                <td style={{padding:"6px 0",textAlign:"right",fontSize:10,color:C.barkL}}>no se contabiliza</td>
              </tr>
              <tr>
                <td style={{padding:"8px 0",color:C.earth,fontWeight:700,fontSize:13}}>Neto evitado</td>
                <td style={{padding:"8px 0"}}></td>
                <td style={{padding:"8px 0",textAlign:"right",fontFamily:"'DM Mono',monospace",color:C.earth,fontWeight:700,fontSize:14}}>{fN(R.co2eAnio)} tCO₂eq</td>
              </tr>
            </tbody>
          </table>
          <div style={{fontSize:9,color:C.barkL,marginTop:6}}>* El CO₂ biogénico del compostaje no se contabiliza en inventarios GEI (IPCC) porque proviene de carbono del ciclo corto.</div>
        </div>

        <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:12}}>
          <MC label="tCO₂eq evitadas/mes" value={fN(R.co2eMes)} color={C.leaf} large/>
          <MC label="tCO₂eq evitadas/año" value={fN(R.co2eAnio)} color={C.earth} large/>
        </div>

        <div style={{background:`${C.leaf}08`,borderRadius:10,padding:"14px",marginBottom:12}}>
          <div style={{fontSize:13,fontWeight:700,color:C.earth,marginBottom:8}}>Equivalencias:</div>
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            <div style={{fontSize:13,color:C.bark}}>
              <strong style={{color:C.earth,fontFamily:"'DM Mono',monospace"}}>{Math.round(R.arboles).toLocaleString("es-EC")}</strong> árboles maduros (absorción anual equivalente)
            </div>
            <div style={{fontSize:13,color:C.bark}}>
              <strong style={{color:C.earth,fontFamily:"'DM Mono',monospace"}}>{Math.round(R.kmAuto).toLocaleString("es-EC")}</strong> km no recorridos en auto
            </div>
            <div style={{fontSize:13,color:C.bark}}>
              <strong style={{color:C.earth,fontFamily:"'DM Mono',monospace"}}>{fN(R.tonResiduosAnio)}</strong> toneladas desviadas del relleno por año
            </div>
          </div>
        </div>

        <div style={{fontSize:10,color:C.barkL,lineHeight:1.5,padding:"0 4px"}}>
          <strong>Metodología IPCC FOD completa</strong> (Vol.5 Ch.3, 2006 con 2019 Refinement):<br/>
          Zona climática: Tropical Montano Húmedo (Quito: 2,800 msnm, T̄=15°C, P̄=1,200mm/año). k=0.28/año (ajustada entre Tropical Wet k=0.4 y Tropical Dry k=0.17, IPCC Table 3.3). DOC=0.15, DOCf=0.5, F=0.5, MCF=1.0, OX=0.1. Horizonte T=20 años. Emisiones compostaje: 4 g CH₄/kg + 0.3 g N₂O/kg (Vol.5 Ch.4). GWP₁₀₀: CH₄=28, N₂O=265 (AR5). Sin recuperación de gas en relleno (R=0).
        </div>
      </Sec>

      <button onClick={descargar} style={{width:"100%",padding:"15px",border:"none",borderRadius:13,background:`linear-gradient(135deg,${C.earth},${C.leaf})`,color:C.white,fontSize:15,fontWeight:700,cursor:"pointer",marginBottom:14,boxShadow:`0 4px 14px ${C.earth}44`}}>📥 Descargar Excel de {nombre}</button>
    </>}

    </div>
    <div style={{padding:"16px 14px 28px",textAlign:"center"}}>
      <div style={{fontSize:9,color:C.barkL}}>Herramienta de referencia · melanievalencia.com</div>
    </div>
  </div>;
}


ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora Financiera — Compostaje Comunitario Quito</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:linear-gradient(170deg,#FFF8E7 0%,#F0E8D5 40%,#E8DFC8 100%);color:#3E2723;min-height:100vh}
input,select,textarea,button{font-family:inherit}
input[type=number]::-webkit-inner-spin-button{opacity:1}
:root{--earth:#2D5016;--earthL:#3A6B1E;--leaf:#5B8C2A;--lime:#A4D65E;--cream:#FFF8E7;--warm:#F5E6C8;--bark:#5C3D2E;--barkL:#7A5642;--soil:#3E2723;--amber:#E8A317;--danger:#C0392B;--success:#27AE60;--white:#FFFFFF;--ghost:rgba(45,80,22,0.06)}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useMemo,useEffect,useCallback}=React;
const C={earth:"#2D5016",earthL:"#3A6B1E",leaf:"#5B8C2A",lime:"#A4D65E",cream:"#FFF8E7",warm:"#F5E6C8",bark:"#5C3D2E",barkL:"#7A5642",soil:"#3E2723",amber:"#E8A317",danger:"#C0392B",success:"#27AE60",white:"#FFFFFF",ghost:"rgba(45,80,22,0.06)"};
const f$=(v)=>`$${Number(v).toFixed(2)}`;
const fN=(v)=>Number(v).toLocaleString("es-EC",{maximumFractionDigits:1});

const FREQ=[{value:4,label:"1 vez por semana"},{value:2,label:"Cada 2 semanas"},{value:1,label:"1 vez al mes"}];

const CERT_OPTIONS=[
  {id:"gad_quito",label:"Registro GAD Quito (Gestión de Residuos)",checked:true,valor:100,amortAnios:3},
  {id:"luae",label:"LUAE (Licencia Única Actividades Económicas)",checked:true,valor:80,amortAnios:1},
  {id:"licencia_ambiental",label:"Licencia Ambiental (MAE/MAATE)",checked:false,valor:250,amortAnios:5},
  {id:"iso14001",label:"ISO 14001 (Gestión Ambiental)",checked:false,valor:1500,amortAnios:3},
  {id:"bpm",label:"Buenas Prácticas de Manufactura (BPM)",checked:false,valor:400,amortAnios:3},
  {id:"organico",label:"Certificación de Producción Orgánica",checked:false,valor:600,amortAnios:2},
  {id:"economia_circular",label:"Sello Economía Circular Ecuador",checked:false,valor:300,amortAnios:3},
  {id:"bcorp",label:"Certificación B Corp",checked:false,valor:2000,amortAnios:3},
];

const TRANSPORT_TYPES=[
  {value:"vehiculo",label:"Vehículo propio (gasolina/diesel)"},
  {value:"moto",label:"Moto"},
  {value:"bicicargo",label:"Bici-cargo"},
  {value:"publico",label:"Transporte público"},
  {value:"mixto",label:"Mixto (vehículo + bus)"},
];

const DEFAULT_ASSETS=[
  {id:1,nombre:"Bici-cargo / vehículo",valor:3000,vidaAnios:5,residual:600},
  {id:2,nombre:"Compostera / equipos",valor:800,vidaAnios:5,residual:0},
  {id:3,nombre:"Herramientas",valor:300,vidaAnios:3,residual:0},
  {id:4,nombre:"Baldes iniciales (lote)",valor:400,vidaAnios:2,residual:0},
  {id:5,nombre:"Adecuación del espacio",valor:500,vidaAnios:5,residual:0},
];

const INTANGIBLE_FIXED=[
  {id:"constitucion",nombre:"Constitución empresa / RUC",valor:200,amortAnios:5},
  {id:"marca",nombre:"Diseño de marca / logo / web",valor:300,amortAnios:5},
  {id:"capacitacion",nombre:"Capacitación inicial del equipo",valor:100,amortAnios:3},
];

// ─── Components ───
function Inp({label,value,onChange,unit,hint,min=0,step=1,max,disabled}){
  return <div style={{marginBottom:16}}>
    <label style={{display:"block",fontSize:13,fontWeight:600,color:C.bark,marginBottom:4}}>{label}</label>
    <div style={{display:"flex",alignItems:"center",gap:6}}>
      <input type="number" value={value} onChange={e=>onChange(Number(e.target.value))} min={min} step={step} max={max} disabled={disabled}
        style={{width:"100%",padding:"10px 12px",border:`1.5px solid ${C.warm}`,borderRadius:10,fontSize:15,fontFamily:"'DM Mono',monospace",color:disabled?C.barkL:C.soil,background:disabled?"#f5f0e8":C.white,outline:"none"}}/>
      {unit&&<span style={{fontSize:12,color:C.barkL,whiteSpace:"nowrap"}}>{unit}</span>}
    </div>
    {hint&&<span style={{fontSize:11,color:C.barkL,marginTop:2,display:"block"}}>{hint}</span>}
  </div>;
}
function Txt({label,value,onChange,hint,placeholder,multiline}){
  const s={width:"100%",padding:"10px 12px",border:`1.5px solid ${C.warm}`,borderRadius:10,fontSize:14,fontFamily:"'DM Sans',sans-serif",color:C.soil,background:C.white,outline:"none",resize:"vertical"};
  return <div style={{marginBottom:16}}>
    <label style={{display:"block",fontSize:13,fontWeight:600,color:C.bark,marginBottom:4}}>{label}</label>
    {multiline?<textarea value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} rows={3} style={s}/>
    :<input type="text" value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} style={s}/>}
    {hint&&<span style={{fontSize:11,color:C.barkL,marginTop:2,display:"block"}}>{hint}</span>}
  </div>;
}
function Sel({label,value,onChange,options,hint}){
  return <div style={{marginBottom:16}}>
    <label style={{display:"block",fontSize:13,fontWeight:600,color:C.bark,marginBottom:4}}>{label}</label>
    <select value={value} onChange={e=>onChange(e.target.value)}
      style={{width:"100%",padding:"10px 12px",border:`1.5px solid ${C.warm}`,borderRadius:10,fontSize:14,color:C.soil,background:C.white,outline:"none"}}>
      {options.map(o=><option key={o.value} value={o.value}>{o.label}</option>)}
    </select>
    {hint&&<span style={{fontSize:11,color:C.barkL,marginTop:2,display:"block"}}>{hint}</span>}
  </div>;
}
function Sec({title,icon,children,accent=C.earth}){
  return <div style={{background:C.white,borderRadius:16,padding:"24px 22px",marginBottom:20,border:`1px solid ${C.warm}`,boxShadow:"0 2px 12px rgba(45,80,22,0.06)"}}>
    <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:18}}>
      <span style={{fontSize:22}}>{icon}</span>
      <h3 style={{margin:0,fontSize:16,fontWeight:700,color:accent,fontFamily:"'Playfair Display',serif",letterSpacing:0.3}}>{title}</h3>
    </div>{children}
  </div>;
}
function MC({label,value,sub,color=C.earth,large}){
  return <div style={{background:`linear-gradient(135deg,${color}11 0%,${color}08 100%)`,borderRadius:14,padding:large?"20px 18px":"14px 14px",border:`1px solid ${color}22`,flex:1,minWidth:140}}>
    <div style={{fontSize:11,color:C.barkL,fontWeight:600,marginBottom:4,textTransform:"uppercase",letterSpacing:0.8}}>{label}</div>
    <div style={{fontSize:large?26:20,fontWeight:700,color,fontFamily:"'DM Mono',monospace"}}>{value}</div>
    {sub&&<div style={{fontSize:11,color:C.barkL,marginTop:2}}>{sub}</div>}
  </div>;
}
function BC({data,color=C.leaf,height=160}){
  const mx=Math.max(...data.map(d=>d.value),1);
  return <div style={{display:"flex",alignItems:"flex-end",gap:6,height,padding:"0 4px"}}>
    {data.map((d,i)=><div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",height:"100%"}}>
      <div style={{flex:1,width:"100%",display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
        <div style={{width:"70%",maxWidth:48,height:`${Math.max((d.value/mx)*100,2)}%`,background:d.hl?C.amber:`linear-gradient(180deg,${color} 0%,${color}BB 100%)`,borderRadius:"6px 6px 2px 2px",transition:"height 0.5s",position:"relative"}}>
          <span style={{position:"absolute",top:-18,left:"50%",transform:"translateX(-50%)",fontSize:9,fontWeight:600,color:C.bark,whiteSpace:"nowrap",fontFamily:"'DM Mono',monospace"}}>{f$(d.value)}</span>
        </div>
      </div>
      <span style={{fontSize:9,color:C.barkL,marginTop:4,textAlign:"center"}}>{d.label}</span>
    </div>)}
  </div>;
}
function PB({value,max,label,color=C.leaf}){
  const p=Math.min((value/max)*100,100);
  return <div style={{marginBottom:12}}>
    <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:4}}>
      <span style={{color:C.bark,fontWeight:600}}>{label}</span><span style={{color:C.barkL}}>{fN(p)}%</span>
    </div>
    <div style={{height:8,background:C.ghost,borderRadius:4,overflow:"hidden"}}>
      <div style={{width:`${p}%`,height:"100%",background:color,borderRadius:4,transition:"width 0.5s"}}/>
    </div>
  </div>;
}
function IB({children,color=C.earth}){
  return <div style={{background:`${color}0A`,borderRadius:10,padding:"10px 14px",marginBottom:12,border:`1px dashed ${color}30`,fontSize:12,color:C.barkL,lineHeight:1.6}}>{children}</div>;
}
function AssetCard({a,onChange,onRemove,showResidual}){
  const dep=a.vidaAnios>0?Math.max(a.valor-(a.residual||0),0)/(a.vidaAnios*12):0;
  return <div style={{background:C.ghost,borderRadius:10,padding:"10px 12px 8px",marginBottom:8,position:"relative"}}>
    <button onClick={onRemove} style={{position:"absolute",top:8,right:8,width:24,height:24,border:"none",borderRadius:6,background:`${C.danger}15`,color:C.danger,cursor:"pointer",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 10px"}}>
      <div style={{gridColumn:"1/-1",marginBottom:8,paddingRight:30}}>
        <input type="text" value={a.nombre} placeholder="¿Qué es?" onChange={e=>onChange({...a,nombre:e.target.value})}
          style={{width:"100%",padding:"7px 10px",border:`1.5px solid ${C.warm}`,borderRadius:8,fontSize:13,color:C.soil,background:C.white,outline:"none",boxSizing:"border-box"}}/>
      </div>
      <div style={{marginBottom:8}}>
        <label style={{display:"block",fontSize:10,fontWeight:600,color:C.barkL,marginBottom:2}}>Costó $</label>
        <input type="number" value={a.valor} min={0} onChange={e=>onChange({...a,valor:Number(e.target.value)})}
          style={{width:"100%",padding:"7px 8px",border:`1.5px solid ${C.warm}`,borderRadius:8,fontSize:13,fontFamily:"'DM Mono',monospace",color:C.soil,background:C.white,outline:"none",textAlign:"right",boxSizing:"border-box"}}/>
      </div>
      <div style={{marginBottom:8}}>
        <label style={{display:"block",fontSize:10,fontWeight:600,color:C.barkL,marginBottom:2}}>¿Cuánto dura?</label>
        <select value={a.vidaAnios} onChange={e=>onChange({...a,vidaAnios:Number(e.target.value)})}
          style={{width:"100%",padding:"7px 6px",border:`1.5px solid ${C.warm}`,borderRadius:8,fontSize:12,color:C.soil,background:C.white,outline:"none",boxSizing:"border-box"}}>
          {[1,2,3,4,5,7,10].map(y=><option key={y} value={y}>{y} año{y>1?"s":""}</option>)}
        </select>
      </div>
      {showResidual&&<div style={{gridColumn:"1/-1",marginBottom:6}}>
        <label style={{display:"block",fontSize:10,fontWeight:600,color:C.barkL,marginBottom:2}}>¿En cuánto podrías venderlo al final? (valor residual)</label>
        <input type="number" value={a.residual||0} min={0} max={a.valor} onChange={e=>onChange({...a,residual:Math.min(Number(e.target.value),a.valor)})}
          style={{width:"100%",padding:"7px 8px",border:`1.5px solid ${C.warm}`,borderRadius:8,fontSize:13,fontFamily:"'DM Mono',monospace",color:C.soil,background:C.white,outline:"none",textAlign:"right",boxSizing:"border-box"}}/>
        <span style={{fontSize:10,color:C.barkL}}>Déjalo en 0 si no sabes. Vehículos: ~20-30% del valor original.</span>
      </div>}
    </div>
    <div style={{fontSize:11,color:C.barkL,borderTop:`1px dashed ${C.warm}`,paddingTop:4,marginTop:2,display:"flex",justifyContent:"space-between"}}>
      <span>{a.nombre||"—"}{(a.residual||0)>0?` (reventa: ${f$(a.residual)})`:""}</span>
      <span>Desgaste: <strong style={{color:C.earth}}>{f$(Math.max(dep,0))}/mes</strong></span>
    </div>
  </div>;
}

// Tier card for hogares/empresas
function TierCard({tier,onChange,onRemove,nameLabel,nameField,countLabel}){
  return <div style={{background:C.ghost,borderRadius:12,padding:"14px 14px 8px",marginBottom:12,position:"relative"}}>
    <button onClick={onRemove} style={{position:"absolute",top:10,right:10,width:26,height:26,border:"none",borderRadius:6,background:`${C.danger}15`,color:C.danger,cursor:"pointer",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"0 12px"}}>
      <div style={{gridColumn:"1/-1",marginBottom:10}}>
        <label style={{display:"block",fontSize:11,fontWeight:600,color:C.barkL,marginBottom:3}}>{nameLabel}</label>
        <input type="text" value={tier[nameField]} placeholder="Ej: Plan semanal..." onChange={e=>onChange({...tier,[nameField]:e.target.value})}
          style={{width:"100%",padding:"8px 10px",border:`1.5px solid ${C.warm}`,borderRadius:8,fontSize:13,color:C.soil,background:C.white,outline:"none",boxSizing:"border-box"}}/>
      </div>
      <div style={{marginBottom:10}}>
        <label style={{display:"block",fontSize:11,fontWeight:600,color:C.barkL,marginBottom:3}}>{countLabel}</label>
        <input type="number" value={tier.cantidad} min={0} onChange={e=>onChange({...tier,cantidad:Number(e.target.value)})}
          style={{width:"100%",padding:"8px 10px",border:`1.5px solid ${C.warm}`,borderRadius:8,fontSize:13,fontFamily:"'DM Mono',monospace",color:C.soil,background:C.white,outline:"none",boxSizing:"border-box"}}/>
      </div>
      <div style={{marginBottom:10}}>
        <label style={{display:"block",fontSize:11,fontWeight:600,color:C.barkL,marginBottom:3}}>Kg / recolección</label>
        <input type="number" value={tier.kgPorRecol} min={0} step={0.5} onChange={e=>onChange({...tier,kgPorRecol:Number(e.target.value)})}
          style={{width:"100%",padding:"8px 10px",border:`1.5px solid ${C.warm}`,borderRadius:8,fontSize:13,fontFamily:"'DM Mono',monospace",color:C.soil,background:C.white,outline:"none",boxSizing:"border-box"}}/>
      </div>
      <div style={{marginBottom:10}}>
        <label style={{display:"block",fontSize:11,fontWeight:600,color:C.barkL,marginBottom:3}}>Frecuencia</label>
        <select value={tier.frecuencia} onChange={e=>onChange({...tier,frecuencia:Number(e.target.value)})}
          style={{width:"100%",padding:"8px 10px",border:`1.5px solid ${C.warm}`,borderRadius:8,fontSize:12,color:C.soil,background:C.white,outline:"none",boxSizing:"border-box"}}>
          {FREQ.map(o=><option key={o.value} value={o.value}>{o.label}</option>)}
        </select>
      </div>
      <div style={{marginBottom:10}}>
        <label style={{display:"block",fontSize:11,fontWeight:600,color:C.barkL,marginBottom:3}}>Tarifa $/mes</label>
        <input type="number" value={tier.tarifa} min={0} step={0.5} onChange={e=>onChange({...tier,tarifa:Number(e.target.value)})}
          style={{width:"100%",padding:"8px 10px",border:`1.5px solid ${C.warm}`,borderRadius:8,fontSize:13,fontFamily:"'DM Mono',monospace",color:C.soil,background:C.white,outline:"none",boxSizing:"border-box"}}/>
      </div>
    </div>
    <div style={{fontSize:11,color:C.barkL,borderTop:`1px dashed ${C.warm}`,paddingTop:6,marginTop:2,display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:4}}>
      <span>{tier.cantidad} × {fN(tier.kgPorRecol)}kg × {tier.frecuencia}x/mes = <strong style={{color:C.earth}}>{fN(tier.cantidad*tier.kgPorRecol*tier.frecuencia)} kg/mes</strong></span>
      <span>Ingreso: <strong style={{color:C.earth}}>{f$(tier.cantidad*tier.tarifa)}/mes</strong></span>
    </div>
  </div>;
}

const TABS=[{id:"costos",label:"Costos",icon:"📊"},{id:"ingresos",label:"Ingresos",icon:"💰"},{id:"resultados",label:"Resultados",icon:"🎯"},{id:"proyeccion",label:"Proyección",icon:"📈"}];

function App(){
  const [nombreEmpresa,setNombreEmpresa]=useState("");
  const [contactoEmail,setContactoEmail]=useState("");
  const [contactoTel,setContactoTel]=useState("");
  const [submitted,setSubmitted]=useState(false);

  const [hogarTiers,setHogarTiers]=useState([
    {id:1,plan:"Semanal",cantidad:50,kgPorRecol:4,frecuencia:4,tarifa:10},
    {id:2,plan:"Quincenal",cantidad:25,kgPorRecol:5,frecuencia:2,tarifa:7},
    {id:3,plan:"Mensual",cantidad:10,kgPorRecol:6,frecuencia:1,tarifa:5},
  ]);
  const [nxH,setNxH]=useState(4);
  const [empresaTiers,setEmpresaTiers]=useState([
    {id:1,tipo:"Restaurantes",cantidad:3,kgPorRecol:20,frecuencia:4,tarifa:40},
    {id:2,tipo:"Oficinas",cantidad:2,kgPorRecol:8,frecuencia:2,tarifa:20},
  ]);
  const [nxE,setNxE]=useState(3);

  const [numFijos,setNumFijos]=useState(1);
  const [salarioFijo,setSalarioFijo]=useState(460);
  const [numJornaleros,setNumJornaleros]=useState(2);
  const [pagoJornalDia,setPagoJornalDia]=useState(20);
  const [diasJornalMes,setDiasJornalMes]=useState(8);

  const [arriendo,setArriendo]=useState(250);
  const [costoAgua,setCostoAgua]=useState(15);
  const [costoLuz,setCostoLuz]=useState(25);
  const [permisos,setPermisos]=useState(30);
  const [marketingCM,setMarketingCM]=useState(30);
  const [marketingPauta,setMarketingPauta]=useState(20);
  const [otrosFijos,setOtrosFijos]=useState(0);
  const [otrosFijosDesc,setOtrosFijosDesc]=useState("");

  const [assets,setAssets]=useState(DEFAULT_ASSETS);
  const [nxA,setNxA]=useState(6);

  // Certificaciones como intangibles
  const [certs,setCerts]=useState(CERT_OPTIONS.map(c=>({...c})));
  const [customCerts,setCustomCerts]=useState([]);
  const [nxCC,setNxCC]=useState(1);

  // Fixed intangibles (no user-editable amort period)
  const [fixedIntangibles,setFixedIntangibles]=useState(INTANGIBLE_FIXED.map(i=>({...i,activo:true})));

  const [invCapitalTrabajo,setInvCapitalTrabajo]=useState(1500);

  const [tipoTransporte,setTipoTransporte]=useState("bicicargo");
  const [combustible,setCombustible]=useState(80);
  const [costoTransPublico,setCostoTransPublico]=useState(0);
  const [mantenimientoVehiculo,setMantenimientoVehiculo]=useState(40);
  const [insumosCompostaje,setInsumosCompostaje]=useState(35);
  const [baldesContenedores,setBaldesContenedores]=useState(20);
  const [otrosVariables,setOtrosVariables]=useState(0);

  const [pctVentaCompost,setPctVentaCompost]=useState(60);
  const [precioKgCompost,setPrecioKgCompost]=useState(0.40);
  const [tasaConversion,setTasaConversion]=useState(30);
  const [otrosIngresos,setOtrosIngresos]=useState(0);

  const [activeTab,setActiveTab]=useState("costos");

  const addH=()=>{setHogarTiers([...hogarTiers,{id:nxH,plan:"",cantidad:10,kgPorRecol:4,frecuencia:4,tarifa:8}]);setNxH(nxH+1);};
  const updH=(id,u)=>setHogarTiers(hogarTiers.map(t=>t.id===id?u:t));
  const rmH=(id)=>setHogarTiers(hogarTiers.filter(t=>t.id!==id));
  const addE=()=>{setEmpresaTiers([...empresaTiers,{id:nxE,tipo:"",cantidad:1,kgPorRecol:10,frecuencia:4,tarifa:25}]);setNxE(nxE+1);};
  const updE=(id,u)=>setEmpresaTiers(empresaTiers.map(t=>t.id===id?u:t));
  const rmE=(id)=>setEmpresaTiers(empresaTiers.filter(t=>t.id!==id));
  const addA=()=>{setAssets([...assets,{id:nxA,nombre:"",valor:0,vidaAnios:3,residual:0}]);setNxA(nxA+1);};
  const updA=(id,u)=>setAssets(assets.map(a=>a.id===id?u:a));
  const rmA=(id)=>setAssets(assets.filter(a=>a.id!==id));
  const addCC=()=>{setCustomCerts([...customCerts,{id:nxCC,label:"",checked:true,valor:0,amortAnios:3}]);setNxCC(nxCC+1);};

  const serviciosBasicos=costoAgua+costoLuz;
  const marketing=marketingCM+marketingPauta;
  const costoTransporte=tipoTransporte==="publico"?costoTransPublico:(combustible+(tipoTransporte==="mixto"?costoTransPublico:0));

  const calc=useMemo(()=>{
    const hogares=hogarTiers.reduce((s,t)=>s+t.cantidad,0);
    const kgH=hogarTiers.reduce((s,t)=>s+t.cantidad*t.kgPorRecol*t.frecuencia,0);
    const incH=hogarTiers.reduce((s,t)=>s+t.cantidad*t.tarifa,0);
    const empCli=empresaTiers.reduce((s,t)=>s+t.cantidad,0);
    const kgE=empresaTiers.reduce((s,t)=>s+t.cantidad*t.kgPorRecol*t.frecuencia,0);
    const incE=empresaTiers.reduce((s,t)=>s+t.cantidad*t.tarifa,0);
    const kgM=kgH+kgE;
    const kgComp=kgM*(tasaConversion/100);

    const depM=assets.reduce((s,a)=>s+(a.vidaAnios>0?Math.max(a.valor-(a.residual||0),0)/(a.vidaAnios*12):0),0);
    // Amortización: certs activas + custom certs + fixed intangibles
    const certAmort=[...certs.filter(c=>c.checked),...customCerts.filter(c=>c.checked)].reduce((s,c)=>s+(c.amortAnios>0?c.valor/(c.amortAnios*12):0),0);
    const fixAmort=fixedIntangibles.filter(i=>i.activo).reduce((s,i)=>s+(i.amortAnios>0?i.valor/(i.amortAnios*12):0),0);
    const amortM=certAmort+fixAmort;
    const desgM=depM+amortM;

    const invActivos=assets.reduce((s,a)=>s+a.valor,0);
    const invIntang=[...certs.filter(c=>c.checked),...customCerts.filter(c=>c.checked)].reduce((s,c)=>s+c.valor,0)+fixedIntangibles.filter(i=>i.activo).reduce((s,i)=>s+i.valor,0);
    const invTotal=invActivos+invIntang+invCapitalTrabajo;

    const iess=salarioFijo*numFijos*0.1115;
    const totSal=salarioFijo*numFijos+iess;
    const d13=(salarioFijo*numFijos)/12;
    const d14=(460/12)*numFijos;
    const fRes=(salarioFijo*numFijos)/12;
    const vac=(salarioFijo*numFijos)/24;
    const benSoc=d13+d14+fRes+vac;
    const costoTotFijos=totSal+benSoc;
    const costoJorn=numJornaleros*pagoJornalDia*diasJornalMes;
    const manoObra=costoTotFijos+costoJorn;

    const mantVeh=tipoTransporte==="publico"?0:mantenimientoVehiculo;
    const cf=arriendo+manoObra+serviciosBasicos+permisos+desgM+marketing+otrosFijos;
    const cv=costoTransporte+mantVeh+insumosCompostaje+baldesContenedores+otrosVariables;
    const costoT=cf+cv;

    const incSusc=incH+incE;
    const incComp=kgComp*(pctVentaCompost/100)*precioKgCompost;
    const incTotal=incSusc+incComp+otrosIngresos;

    const uBruta=incTotal-costoT;
    const mBruto=incTotal>0?(uBruta/incTotal)*100:0;
    const partTrab=uBruta>0?uBruta*0.15:0;
    const impR=incTotal*0.02;
    const uNeta=uBruta-partTrab-impR;
    const mNeto=incTotal>0?(uNeta/incTotal)*100:0;

    const totalCli=hogares+empCli;
    const costoPorCli=totalCli>0?costoT/totalCli:0;
    const tarifaProm=totalCli>0?incSusc/totalCli:0;
    const tarifaEq=totalCli>0?(costoT-incComp-otrosIngresos)/totalCli:0;
    const cliEq=tarifaProm>0?(costoT-incComp-otrosIngresos)/tarifaProm:0;
    const costoPorKg=kgM>0?costoT/kgM:0;

    const mesRec=uNeta>0?invTotal/uNeta:Infinity;
    const roi=invTotal>0?((uNeta*12)/invTotal)*100:0;

    const proy=[];
    let ac=-invTotal;
    for(let m=1;m<=12;m++){
      const cr=1+(m-1)*0.05;
      const hKg=hogarTiers.reduce((s,t)=>s+Math.round(t.cantidad*cr)*t.kgPorRecol*t.frecuencia,0);
      const hInc=hogarTiers.reduce((s,t)=>s+Math.round(t.cantidad*cr)*t.tarifa,0);
      const hN=hogarTiers.reduce((s,t)=>s+Math.round(t.cantidad*cr),0);
      const eKg=empresaTiers.reduce((s,t)=>s+Math.round(t.cantidad*cr)*t.kgPorRecol*t.frecuencia,0);
      const eInc=empresaTiers.reduce((s,t)=>s+Math.round(t.cantidad*cr)*t.tarifa,0);
      const eN=empresaTiers.reduce((s,t)=>s+Math.round(t.cantidad*cr),0);
      const kgMM=hKg+eKg;
      const iM=hInc+eInc+(kgMM*(tasaConversion/100)*(pctVentaCompost/100)*precioKgCompost)+otrosIngresos;
      const cvM=cv*(cr*0.7+0.3);
      const cM=cf+cvM;
      const uM=iM-cM;
      ac+=uM;
      proy.push({mes:m,hog:hN,emp:eN,ingreso:iM,costo:cM,utilidad:uM,acum:ac});
    }

    return {kgM,kgH,kgE,kgComp,hogares,empCli,depM,amortM,desgM,iess,totSal,benSoc,d13,d14,fRes,vac,costoTotFijos,costoJorn,manoObra,cf,cv,costoT,incH,incE,incSusc,incComp,incTotal,uBruta,mBruto,partTrab,impR,uNeta,mNeto,totalCli,costoPorCli,tarifaProm,tarifaEq,cliEq,costoPorKg,invTotal,invActivos,invIntang,mesRec,roi,proy};
  },[hogarTiers,empresaTiers,numFijos,salarioFijo,numJornaleros,pagoJornalDia,diasJornalMes,arriendo,serviciosBasicos,permisos,marketing,otrosFijos,assets,certs,customCerts,fixedIntangibles,costoTransporte,mantenimientoVehiculo,tipoTransporte,insumosCompostaje,baldesContenedores,otrosVariables,pctVentaCompost,precioKgCompost,tasaConversion,otrosIngresos,invCapitalTrabajo]);

        res:{costoT:calc.costoT,incTotal:calc.incTotal,uNeta:calc.uNeta,mNeto:calc.mNeto,cliEq:calc.cliEq,tarifaEq:calc.tarifaEq,roi:calc.roi,mesRec:calc.mesRec,invTotal:calc.invTotal}};

      ...calc.proy.map(p=>`${String(p.mes).padStart(2)}  ${String(p.hog).padStart(4)} ${String(p.emp).padStart(4)}  ${f$(p.ingreso).padStart(10)}  ${f$(p.costo).padStart(10)}  ${f$(p.utilidad).padStart(10)}  ${f$(p.acum).padStart(10)}`),
      "","Calculadora de referencia · melanievalencia.com"
    ].filter(x=>x!==null).join("\n");
    const b=new Blob([l],{type:"text/plain;charset=utf-8"});
    const u=URL.createObjectURL(b);

            <button onClick={()=>setCustomCerts(customCerts.filter((_,j)=>j!==i))} style={{width:22,height:22,border:"none",borderRadius:4,background:`${C.danger}15`,color:C.danger,cursor:"pointer",fontSize:12,display:"flex",alignItems:"center",justifyContent:"center",marginTop:2}}>×</button>
          </div>)}
          <button onClick={addCC} style={{width:"100%",padding:"8px",border:`1.5px dashed ${C.leaf}60`,borderRadius:10,background:`${C.leaf}08`,color:C.leaf,fontSize:12,fontWeight:600,cursor:"pointer",marginTop:4}}>+ Agregar otra certificación</button>

          <div style={{marginTop:16,fontSize:13,fontWeight:700,color:C.bark,marginBottom:8}}>Otros gastos iniciales (sin certificaciones)</div>
          {fixedIntangibles.map((fi,i)=><label key={fi.id} style={{display:"flex",alignItems:"center",gap:10,marginBottom:8,cursor:"pointer"}}>
            <input type="checkbox" checked={fi.activo} onChange={e=>{const n=[...fixedIntangibles];n[i]={...n[i],activo:e.target.checked};setFixedIntangibles(n);}}
              style={{accentColor:C.leaf,width:18,height:18}}/>
            <div style={{flex:1,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span style={{fontSize:13,color:C.bark}}>{fi.nombre}</span>
              <div style={{display:"flex",alignItems:"center",gap:4}}>
                <span style={{fontSize:11,color:C.barkL}}>$</span>
                <input type="number" value={fi.valor} min={0} onChange={e=>{const n=[...fixedIntangibles];n[i]={...n[i],valor:Number(e.target.value)};setFixedIntangibles(n);}}
                  style={{width:70,padding:"4px 6px",border:`1px solid ${C.warm}`,borderRadius:6,fontSize:12,fontFamily:"'DM Mono',monospace",textAlign:"right",outline:"none"}}/>
                <span style={{fontSize:10,color:C.barkL}}>/{fi.amortAnios}a</span>
              </div>
            </div>
          </label>)}

          <div style={{background:`${C.leaf}15`,borderRadius:10,padding:"12px 14px",marginTop:12}}>
            <span style={{fontSize:12,color:C.barkL}}>Amortización mensual total: </span><span style={{fontSize:17,fontWeight:700,color:C.leaf,fontFamily:"'DM Mono',monospace"}}>{f$(calc.amortM)}/mes</span>
          </div>
          <div style={{background:`${C.earth}10`,borderRadius:10,padding:"12px 14px",marginTop:10,border:`1px solid ${C.earth}20`}}>
            <span style={{fontSize:12,color:C.barkL}}>Total desgaste + amortización: </span><span style={{fontSize:17,fontWeight:700,color:C.earth,fontFamily:"'DM Mono',monospace"}}>{f$(calc.desgM)}/mes</span>
          </div>
        </Sec>

        <Sec title="Otros costos fijos" icon="🏢" accent={C.bark}>
          <Inp label="Arriendo" value={arriendo} onChange={setArriendo} unit="$/mes" hint="Valles de Quito: $150-400"/>
          <Inp label="Agua" value={costoAgua} onChange={setCostoAgua} unit="$/mes"/>
          <Inp label="Luz" value={costoLuz} onChange={setCostoLuz} unit="$/mes"/>
          <Inp label="Permisos mensuales prorrateados" value={permisos} onChange={setPermisos} unit="$/mes"/>
          <Inp label="Marketing / community manager" value={marketingCM} onChange={setMarketingCM} unit="$/mes"/>
          <Inp label="Pauta publicitaria" value={marketingPauta} onChange={setMarketingPauta} unit="$/mes"/>
          <Inp label="Otros costos fijos" value={otrosFijos} onChange={setOtrosFijos} unit="$/mes"/>
          {otrosFijos>0&&<Txt label="¿Qué incluyen?" value={otrosFijosDesc} onChange={setOtrosFijosDesc} placeholder="Seguro, contador, telefonía..." multiline/>}
          <div style={{background:`${C.bark}0D`,borderRadius:10,padding:"12px 14px",marginTop:8}}>
            <span style={{fontSize:12,color:C.barkL}}>Total fijos: </span><span style={{fontSize:17,fontWeight:700,color:C.bark,fontFamily:"'DM Mono',monospace"}}>{f$(calc.cf)}</span>
          </div>
        </Sec>

        <Sec title="Costos variables" icon="⛽" accent={C.barkL}>
          <Sel label="Tipo de transporte" value={tipoTransporte} onChange={setTipoTransporte} options={TRANSPORT_TYPES}/>
          {(tipoTransporte==="vehiculo"||tipoTransporte==="moto"||tipoTransporte==="bicicargo")&&
            <Inp label="Combustible / energía" value={combustible} onChange={setCombustible} unit="$/mes" hint={tipoTransporte==="bicicargo"?"Mantenimiento de bici":"Gasolina mensual"}/>}
          {(tipoTransporte==="publico"||tipoTransporte==="mixto")&&
            <Inp label="Pasajes transporte público" value={costoTransPublico} onChange={setCostoTransPublico} unit="$/mes" hint="Buses, trole, ecovía, etc."/>}
          {tipoTransporte==="mixto"&&
            <Inp label="Combustible vehículo" value={combustible} onChange={setCombustible} unit="$/mes"/>}
          {tipoTransporte!=="publico"&&
            <Inp label="Mantenimiento vehículo" value={mantenimientoVehiculo} onChange={setMantenimientoVehiculo} unit="$/mes"/>}
          <Inp label="Insumos de compostaje" value={insumosCompostaje} onChange={setInsumosCompostaje} unit="$/mes" hint="Material seco, microorganismos"/>
          <Inp label="Baldes / contenedores" value={baldesContenedores} onChange={setBaldesContenedores} unit="$/mes"/>
          <Inp label="Otros variables" value={otrosVariables} onChange={setOtrosVariables} unit="$/mes"/>
          <div style={{background:`${C.barkL}0D`,borderRadius:10,padding:"12px 14px",marginTop:8}}>
            <span style={{fontSize:12,color:C.barkL}}>Total variables: </span><span style={{fontSize:17,fontWeight:700,color:C.barkL,fontFamily:"'DM Mono',monospace"}}>{f$(calc.cv)}</span>
          </div>
        </Sec>

        <Sec title="Inversión inicial" icon="🏗️" accent={C.amber}>
          <Inp label="Equipos" value={calc.invActivos} onChange={()=>{}} unit="$" disabled/>
          <Inp label="Certificaciones + intangibles" value={calc.invIntang} onChange={()=>{}} unit="$" disabled/>
          <Inp label="Capital de trabajo" value={invCapitalTrabajo} onChange={setInvCapitalTrabajo} unit="$" hint="Para los primeros meses"/>
          <div style={{background:`${C.amber}15`,borderRadius:10,padding:"12px 14px",marginTop:8}}>
            <span style={{fontSize:12,color:C.barkL}}>Inversión total: </span><span style={{fontSize:17,fontWeight:700,color:C.amber,fontFamily:"'DM Mono',monospace"}}>{f$(calc.invTotal)}</span>
          </div>
        </Sec>
      </>}

      {activeTab==="ingresos"&&<>
        <Sec title="Tarifas de suscripción" icon="💳">
          <IB>💡 Las tarifas se configuran por plan en la pestaña de Costos. Aquí ves el resumen.</IB>
          <div style={{fontSize:13,fontWeight:700,color:C.earth,marginBottom:8}}>🏠 Hogares ({calc.hogares})</div>
          {hogarTiers.filter(t=>t.cantidad>0).map(t=><div key={t.id} style={{display:"flex",justifyContent:"space-between",fontSize:12,padding:"4px 0",color:C.bark}}>
            <span>{t.plan||"?"} ({t.cantidad}) — {FREQ.find(o=>o.value===t.frecuencia)?.label||""} — {f$(t.tarifa)}/mes</span>
            <span style={{fontFamily:"'DM Mono',monospace",fontWeight:600}}>{f$(t.cantidad*t.tarifa)}</span>
          </div>)}
          <div style={{background:C.ghost,borderRadius:10,padding:"10px 14px",margin:"8px 0 16px"}}><span style={{fontSize:12,color:C.barkL}}>Subtotal hogares: </span><span style={{fontSize:15,fontWeight:700,color:C.earth,fontFamily:"'DM Mono',monospace"}}>{f$(calc.incH)}/mes</span></div>

          {calc.empCli>0&&<><div style={{fontSize:13,fontWeight:700,color:C.earthL,marginBottom:8}}>🏢 Empresas ({calc.empCli})</div>
          {empresaTiers.filter(t=>t.cantidad>0).map(t=><div key={t.id} style={{display:"flex",justifyContent:"space-between",fontSize:12,padding:"4px 0",color:C.bark}}>
            <span>{t.tipo||"?"} ({t.cantidad}) — {FREQ.find(o=>o.value===t.frecuencia)?.label||""} — {f$(t.tarifa)}/mes</span>
            <span style={{fontFamily:"'DM Mono',monospace",fontWeight:600}}>{f$(t.cantidad*t.tarifa)}</span>
          </div>)}
          <div style={{background:C.ghost,borderRadius:10,padding:"10px 14px",margin:"8px 0 16px"}}><span style={{fontSize:12,color:C.barkL}}>Subtotal empresas: </span><span style={{fontSize:15,fontWeight:700,color:C.earthL,fontFamily:"'DM Mono',monospace"}}>{f$(calc.incE)}/mes</span></div></>}

          <div style={{background:`${C.earth}10`,borderRadius:10,padding:"12px 14px",border:`1px solid ${C.earth}20`}}>
            <span style={{fontSize:12,color:C.barkL}}>Total suscripciones: </span><span style={{fontSize:17,fontWeight:700,color:C.earth,fontFamily:"'DM Mono',monospace"}}>{f$(calc.incSusc)}/mes</span>
          </div>
        </Sec>
        <Sec title="Venta de compost" icon="🌿" accent={C.leaf}>
          <Inp label="Conversión residuo → compost" value={tasaConversion} onChange={setTasaConversion} unit="%" min={10} max={50} hint="Típico: 25-35%"/>
          <Inp label="% compost a la venta" value={pctVentaCompost} onChange={setPctVentaCompost} unit="%" max={100}/>
          <Inp label="Precio por kg" value={precioKgCompost} onChange={setPrecioKgCompost} unit="$/kg" step={0.05} hint="$0.25-0.80/kg"/>
          <div style={{background:`${C.leaf}0D`,borderRadius:10,padding:"12px 14px"}}>
            <div style={{fontSize:12,color:C.barkL}}>Compost: <strong>{fN(calc.kgComp)} kg/mes</strong></div>
            <span style={{fontSize:12,color:C.barkL}}>Ingreso: </span><span style={{fontSize:17,fontWeight:700,color:C.leaf,fontFamily:"'DM Mono',monospace"}}>{f$(calc.incComp)}/mes</span>
          </div>
        </Sec>
        <Sec title="Otros ingresos" icon="✨" accent={C.amber}>
          <Inp label="Talleres, bonos, consultoría" value={otrosIngresos} onChange={setOtrosIngresos} unit="$/mes"/>
        </Sec>
        <div style={{background:`linear-gradient(135deg,${C.earth} 0%,${C.leaf} 100%)`,borderRadius:16,padding:"20px 18px",color:C.white}}>
          <div style={{fontSize:12,fontWeight:600,opacity:0.8,marginBottom:4}}>INGRESO TOTAL MENSUAL</div>
          <div style={{fontSize:28,fontWeight:700,fontFamily:"'DM Mono',monospace"}}>{f$(calc.incTotal)}</div>
        </div>
      </>}

      {(activeTab==="resultados"||activeTab==="proyeccion")&&!canView&&
        <Sec title="Desbloquea resultados" icon="🔐">
          <IB>Ingresa el nombre de tu empresa en la pestaña de Costos y presiona el botón.</IB>
          {!nombreEmpresa.trim()&&<p style={{color:C.danger,fontSize:13,fontWeight:600}}>⚠️ Primero ingresa el nombre de tu empresa</p>}
          {nombreEmpresa.trim()&&<button onClick={handleSubmit} style={{width:"100%",padding:"14px",border:"none",borderRadius:12,background:`linear-gradient(135deg,${C.earth} 0%,${C.leaf} 100%)`,color:C.white,fontSize:15,fontWeight:700,cursor:"pointer",boxShadow:`0 4px 16px ${C.earth}44`}}>🚀 Enviar y ver resultados</button>}
        </Sec>}

      {activeTab==="resultados"&&canView&&<>
        <Sec title={`Estado de resultados — ${nombreEmpresa}`} icon="📋">
          {[
            {l:"Ingresos totales",v:calc.incTotal,b:true,c:C.earth},
            {l:"  Hogares",v:calc.incH,indent:true},{l:"  Empresas",v:calc.incE,indent:true},{l:"  Compost",v:calc.incComp,indent:true},{l:"  Otros",v:otrosIngresos,indent:true},
            {div:true},
            {l:"(-) Mano obra t. completo",v:calc.costoTotFijos,c:C.danger},{l:"(-) Jornaleros",v:calc.costoJorn,c:C.danger},
            {l:"(-) Arriendo",v:arriendo,c:C.danger},{l:"(-) Agua",v:costoAgua,c:C.danger},{l:"(-) Luz",v:costoLuz,c:C.danger},
            {l:"(-) Depreciación",v:calc.depM,c:C.danger},{l:"(-) Amortización",v:calc.amortM,c:C.danger},
            {l:"(-) Marketing/CM",v:marketingCM,c:C.danger},{l:"(-) Pauta",v:marketingPauta,c:C.danger},{l:"(-) Permisos",v:permisos,c:C.danger},
            otrosFijos>0?{l:`(-) ${otrosFijosDesc||"Otros fijos"}`,v:otrosFijos,c:C.danger}:null,
            {l:"(-) Variables",v:calc.cv,c:C.danger},
            {div:true},
            {l:"= Utilidad bruta",v:calc.uBruta,b:true,c:calc.uBruta>=0?C.success:C.danger},
            {l:"(-) 15% Particip.",v:calc.partTrab,c:C.barkL},{l:"(-) RIMPE 2%",v:calc.impR,c:C.barkL},
            {div:true},
            {l:"= UTILIDAD NETA",v:calc.uNeta,b:true,big:true,c:calc.uNeta>=0?C.success:C.danger},
          ].filter(Boolean).map((r,i)=>r.div?<div key={i} style={{borderTop:`1px dashed ${C.warm}`,margin:"8px 0"}}/>:
            <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"5px 0",fontSize:r.big?16:r.indent?12:13,fontWeight:r.b?700:400,color:r.c||C.soil}}>
              <span>{r.l}</span><span style={{fontFamily:"'DM Mono',monospace",fontWeight:r.b?700:500}}>{f$(r.v)}</span>
            </div>)}
          <div style={{marginTop:12}}><PB label="Margen bruto" value={Math.max(calc.mBruto,0)} max={100} color={calc.mBruto>20?C.success:C.amber}/><PB label="Margen neto" value={Math.max(calc.mNeto,0)} max={100} color={calc.mNeto>10?C.success:C.amber}/></div>
        </Sec>
        <Sec title="Indicadores" icon="🎯" accent={C.amber}>
          <div style={{display:"flex",flexWrap:"wrap",gap:10,marginBottom:14}}><MC label="Costo/cliente" value={f$(calc.costoPorCli)} sub="mensual" color={C.bark}/><MC label="Costo/kg" value={f$(calc.costoPorKg)} sub="residuo" color={C.barkL}/></div>
          <div style={{display:"flex",flexWrap:"wrap",gap:10}}><MC label="ROI anual" value={`${fN(calc.roi)}%`} color={calc.roi>0?C.success:C.danger}/><MC label="Recuperación" value={calc.mesRec===Infinity?"N/A":`${fN(calc.mesRec)} meses`} color={calc.mesRec<=12?C.success:C.amber}/></div>
        </Sec>
        <Sec title="Punto de equilibrio" icon="⚖️">
          <div style={{display:"flex",flexWrap:"wrap",gap:10,marginBottom:16}}>
            <MC label="Clientes mínimos" value={Math.ceil(Math.max(calc.cliEq,0))} sub={`tarifa prom. ${f$(calc.tarifaProm)}`} color={calc.totalCli>=calc.cliEq?C.success:C.danger} large/>
            <MC label="Tarifa equilibrio" value={f$(Math.max(calc.tarifaEq,0))} sub={`con ${calc.totalCli} clientes`} color={calc.tarifaProm>=calc.tarifaEq?C.success:C.danger} large/>
          </div>
          <div style={{fontSize:13,fontWeight:600,color:C.bark,marginBottom:10}}>¿En qué se va tu dinero?</div>
          <BC data={[{label:"T.compl.",value:calc.costoTotFijos},{label:"Jornal.",value:calc.costoJorn},{label:"Arriendo",value:arriendo},{label:"Transp.",value:costoTransporte+(tipoTransporte!=="publico"?mantenimientoVehiculo:0)},{label:"Deprec.",value:calc.depM},{label:"Amort.",value:calc.amortM},{label:"Mktg",value:marketing},{label:"Otros",value:serviciosBasicos+permisos+otrosFijos+otrosVariables+insumosCompostaje+baldesContenedores}]} color={C.bark}/>
          <div style={{marginTop:16,padding:"14px",background:ok?`${C.success}10`:`${C.danger}10`,borderRadius:12,border:`1px solid ${ok?C.success:C.danger}30`}}>
            <div style={{fontSize:14,fontWeight:700,color:ok?C.success:C.danger,marginBottom:4}}>{ok?"✅ Rentable":"⚠️ Aún no rentable"}</div>
            <div style={{fontSize:12,color:C.barkL,lineHeight:1.5}}>{ok?`Con ${calc.totalCli} clientes generas ${f$(calc.uNeta)} netos/mes.`:`Necesitas ${Math.ceil(Math.max(calc.cliEq,0))} clientes o ajustar tarifas.`}</div>
          </div>
        </Sec>
        <button onClick={dlReport} style={{width:"100%",padding:"16px",border:"none",borderRadius:14,background:`linear-gradient(135deg,${C.earth} 0%,${C.leaf} 100%)`,color:C.white,fontSize:15,fontWeight:700,cursor:"pointer",marginBottom:16,boxShadow:`0 4px 16px ${C.earth}44`}}>📥 Descargar reporte</button>
      </>}

      {activeTab==="proyeccion"&&canView&&<>
        <Sec title="Proyección 12 meses" icon="📈">
          <p style={{fontSize:12,color:C.barkL,margin:"0 0 14px",lineHeight:1.5}}>Crecimiento 5%/mes. Variables escalan parcialmente.</p>
          <div style={{fontSize:13,fontWeight:600,color:C.bark,marginBottom:10}}>Utilidad mensual</div>
          <BC data={calc.proy.map(p=>({label:`M${p.mes}`,value:Math.max(p.utilidad,0),hl:p.utilidad<0}))} color={C.leaf} height={140}/>
          <div style={{marginTop:20,fontSize:13,fontWeight:600,color:C.bark,marginBottom:10}}>Flujo acumulado</div>
          <BC data={calc.proy.map(p=>({label:`M${p.mes}`,value:Math.max(p.acum,0),hl:p.acum<0}))} color={C.earth} height={140}/>
          <div style={{overflowX:"auto",marginTop:16}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:11,fontFamily:"'DM Mono',monospace"}}>
              <thead><tr style={{borderBottom:`2px solid ${C.warm}`}}>{["Mes","Hog","Emp","Ingreso","Costo","Util.","Acum."].map(h=><th key={h} style={{padding:"6px 4px",textAlign:"right",fontSize:10,fontWeight:600,color:C.barkL}}>{h}</th>)}</tr></thead>
              <tbody>{calc.proy.map(p=><tr key={p.mes} style={{borderBottom:`1px solid ${C.ghost}`}}>
                <td style={{padding:"5px 4px",textAlign:"right",fontWeight:600}}>{p.mes}</td>
                <td style={{padding:"5px 4px",textAlign:"right"}}>{p.hog}</td>
                <td style={{padding:"5px 4px",textAlign:"right"}}>{p.emp}</td>
                <td style={{padding:"5px 4px",textAlign:"right",color:C.earth}}>{f$(p.ingreso)}</td>
                <td style={{padding:"5px 4px",textAlign:"right",color:C.danger}}>{f$(p.costo)}</td>
                <td style={{padding:"5px 4px",textAlign:"right",color:p.utilidad>=0?C.success:C.danger,fontWeight:600}}>{f$(p.utilidad)}</td>
                <td style={{padding:"5px 4px",textAlign:"right",color:p.acum>=0?C.success:C.danger,fontWeight:600}}>{f$(p.acum)}</td>
              </tr>)}</tbody>
            </table>
          </div>
        </Sec>
        <Sec title="Resumen anual" icon="🗓️" accent={C.amber}>
          <div style={{display:"flex",flexWrap:"wrap",gap:10}}><MC label="Ingreso anual" value={f$(calc.proy.reduce((s,p)=>s+p.ingreso,0))} color={C.earth} large/><MC label="Utilidad anual" value={f$(calc.proy.reduce((s,p)=>s+p.utilidad,0))} color={calc.proy.reduce((s,p)=>s+p.utilidad,0)>0?C.success:C.danger} large/></div>
          <div style={{display:"flex",flexWrap:"wrap",gap:10,marginTop:10}}><MC label="Clientes mes 12" value={(calc.proy[11]?.hog||0)+(calc.proy[11]?.emp||0)} color={C.leaf}/><MC label="Recuperación" value={(()=>{const m=calc.proy.findIndex(p=>p.acum>=0);return m>=0?`Mes ${m+1}`:"No alcanzado";})()} color={C.amber}/></div>
        </Sec>
        <div style={{background:`${C.earth}08`,borderRadius:14,padding:"16px 14px",border:`1px solid ${C.earth}15`}}>
          <div style={{fontSize:12,fontWeight:700,color:C.earth,marginBottom:8}}>📝 Notas</div>
          <div style={{fontSize:11,color:C.barkL,lineHeight:1.7}}>
            <strong>IESS:</strong> Patronal 11.15% solo tiempo completo.<br/>
            <strong>RIMPE:</strong> 2% sobre ingresos. 15% participación trabajadores.<br/>
            <strong>Depreciación:</strong> (costo − valor residual) ÷ vida útil.<br/>
            <strong>Amortización:</strong> Certificaciones e intangibles en períodos razonables (1-5 años según tipo).<br/>
            <strong>Nota:</strong> Herramienta de referencia. Consulte un contador.
          </div>
        </div>
        <button onClick={dlReport} style={{width:"100%",padding:"16px",border:"none",borderRadius:14,marginTop:16,background:`linear-gradient(135deg,${C.earth} 0%,${C.leaf} 100%)`,color:C.white,fontSize:15,fontWeight:700,cursor:"pointer",boxShadow:`0 4px 16px ${C.earth}44`}}>📥 Descargar reporte</button>
      </>}
    </div>

    <div style={{padding:"20px 16px 32px",textAlign:"center"}}>
      <div style={{fontSize:10,color:C.barkL,lineHeight:1.6}}>Calculadora de referencia · No constituye asesoría contable<br/>melanievalencia.com · Quito, 2025</div>
    </div>
  </div>;
}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
